<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>匣中珠光 · 螺钿非遗互动剧情</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23d4a853'/%3E%3Ccircle cx='16' cy='16' r='9' fill='%23fff4d6' opacity='.8'/%3E%3Ccircle cx='13' cy='13' r='3' fill='%23ffffff' opacity='.7'/%3E%3C/svg%3E">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* 设计令牌：统一管理核心色板，便于后续主题扩展与维护 */
:root{--bg-deep:#1a0f08;--gold:#d4a853;--gold-soft:#c9b896;--text:#e8d5b0;--text-dim:#8a6a3a;--ink:#2a1810;--border-gold:rgba(200,160,100,.3)}
html,body{width:100%;height:100%;overflow:hidden;font-family:"STKaiti","KaiTi","楷体",serif;background:var(--bg-deep);color:var(--text);user-select:none}
.bg-canvas{display:block;position:absolute;top:0;left:0}
canvas{display:block}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .3s cubic-bezier(.4,0,.2,1)}

/* ===== 高级感标题场景 - 东方古典奢华风格 ===== */
#title-scene{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%,rgba(60,35,18,.95) 0%,rgba(30,18,10,.98) 45%,rgba(12,7,4,1) 100%),
    linear-gradient(180deg,#0d0704 0%,#1a0f08 50%,#0a0503 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:10;overflow:hidden;
}
/* 漆面纹理噪点覆盖层 */
#title-scene::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.6;pointer-events:none;z-index:1;
}
/* 中心珠光光晕 */
#title-scene::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(212,168,83,.08) 0%,rgba(180,130,60,.04) 30%,transparent 65%);
  border-radius:50%;pointer-events:none;z-index:1;
  animation:pearlGlow 8s ease-in-out infinite;
}
@keyframes pearlGlow{
  0%,100%{opacity:.5;transform:translate(-50%,-55%) scale(1)}
  50%{opacity:.9;transform:translate(-50%,-55%) scale(1.1)}
}
.title-deco{position:absolute;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:2}
/* 多重同心圆环装饰 - 更精致的脉冲 */
.title-deco::before,.title-deco::after{
  content:'';position:absolute;border-radius:50%;
  border:1px solid rgba(212,168,83,.1);
}
.title-deco::before{
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:500px;height:500px;
  animation:ringPulse 6s ease-in-out infinite;
}
.title-deco::after{
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:700px;
  animation:ringPulse 6s ease-in-out infinite 2s;
}
@keyframes ringPulse{
  0%,100%{opacity:.15;transform:translate(-50%,-50%) scale(.95)}
  50%{opacity:.05;transform:translate(-50%,-50%) scale(1.05)}
}
/* 四角云纹装饰 */
.title-corner{position:absolute;width:120px;height:120px;opacity:.3;pointer-events:none;z-index:2}
.title-corner::before,.title-corner::after{
  content:'';position:absolute;background:linear-gradient(90deg,transparent,rgba(212,168,83,.4),transparent);
}
.title-corner.tl{top:40px;left:40px}
.title-corner.tr{top:40px;right:40px;transform:scaleX(-1)}
.title-corner.bl{bottom:40px;left:40px;transform:scaleY(-1)}
.title-corner.br{bottom:40px;right:40px;transform:scale(-1)}
.title-corner::before{top:0;left:0;width:60px;height:1px}
.title-corner::after{top:0;left:0;width:1px;height:60px;background:linear-gradient(180deg,transparent,rgba(212,168,83,.4),transparent)}
/* 浮动粒子容器 */
.title-particles{position:absolute;inset:0;pointer-events:none;z-index:2}
.particle{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,240,200,.9),rgba(212,168,83,.3));
  box-shadow:0 0 6px rgba(255,240,200,.5),0 0 12px rgba(212,168,83,.2);
  animation:floatParticle linear infinite;
}
@keyframes floatParticle{
  0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0}
  10%{opacity:1;transform:scale(1)}
  90%{opacity:1}
  100%{transform:translateY(-100px) translateX(var(--drift,30px)) scale(0);opacity:0}
}
/* 标题主样式 - 更有质感的书法感 */
.title-wrap{position:relative;z-index:5;animation:titleIn 1.5s cubic-bezier(.25,.46,.45,.94) both}
.title-seal{
  position:absolute;top:-20px;right:-60px;width:50px;height:50px;
  background:linear-gradient(135deg,#a03020,#802015);
  border:2px solid #d4a853;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:"STKaiti","KaiTi",serif;font-size:1.4rem;color:#f0d0a0;
  box-shadow:0 4px 15px rgba(0,0,0,.5),inset 0 0 10px rgba(0,0,0,.3);
  transform:rotate(8deg);opacity:.9;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}
.title-main{
  font-size:clamp(3rem,10vw,5.5rem);
  font-weight:400;
  color:#e8c878;
  text-shadow:
    0 0 40px rgba(212,168,83,.8),
    0 0 80px rgba(212,168,83,.5),
    0 0 120px rgba(212,168,83,.25),
    0 1px 0 rgba(255,240,200,.5),
    0 2px 0 rgba(180,130,50,.3),
    0 3px 2px rgba(0,0,0,.95),
    0 6px 10px rgba(0,0,0,.7),
    0 12px 20px rgba(0,0,0,.4);
  letter-spacing:.4em;
  margin-bottom:.3em;
  position:relative;
}
.title-main::before,.title-main::after{
  content:'';position:absolute;top:50%;height:1px;
}
.title-main::before{
  right:calc(100% + 30px);width:clamp(40px,8vw,100px);
  background:linear-gradient(90deg,transparent,rgba(212,168,83,.6));
}
.title-main::after{
  left:calc(100% + 30px);width:clamp(40px,8vw,100px);
  background:linear-gradient(90deg,rgba(212,168,83,.6),transparent);
}
/* 标题装饰线 - 中式纹样 */
.title-ornament{
  display:flex;align-items:center;justify-content:center;gap:1rem;
  margin-bottom:.8em;
}
.title-ornament-line{
  width:clamp(60px,12vw,120px);height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,83,.5),transparent);
}
.title-ornament-diamond{
  width:8px;height:8px;background:#d4a853;
  transform:rotate(45deg);
  box-shadow:0 0 10px rgba(212,168,83,.6);
}
.title-sub{
  font-size:clamp(.85rem,2vw,1.1rem);
  color:#a08860;
  letter-spacing:.6em;
  margin-bottom:2.5em;
  font-weight:300;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  position:relative;
  animation:titleIn 1.5s cubic-bezier(.25,.46,.45,.94) .3s both;
}
.title-sub::before,.title-sub::after{
  content:'·';color:#d4a853;margin:0 1em;opacity:.6;
}
@keyframes titleIn{
  from{opacity:0;transform:translateY(40px);filter:blur(4px)}
  to{opacity:1;transform:translateY(0);filter:blur(0)}
}
/* 按钮容器 */
.title-btns{
  display:flex;flex-direction:column;gap:.8rem;
  animation:titleIn 1.5s cubic-bezier(.25,.46,.45,.94) .6s both;
  position:relative;z-index:5;
}
.title-btn{
  background:linear-gradient(180deg,rgba(80,50,25,.75) 0%,rgba(50,30,15,.85) 100%);
  border:1px solid rgba(212,168,83,.35);
  color:#d8c090;
  padding:16px 60px;
  font-size:1.05rem;
  letter-spacing:.4em;
  border-radius:3px;
  position:relative;
  overflow:hidden;
  min-width:260px;
  text-shadow:0 1px 2px rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
}
.title-btn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,240,200,.3),transparent);
}
.title-btn::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(105deg,
    transparent 30%,
    rgba(255,245,210,.08) 42%,
    rgba(255,235,180,.15) 50%,
    rgba(255,245,210,.08) 58%,
    transparent 70%);
  transform:translateX(-100%);
  transition:transform .8s cubic-bezier(.25,.46,.45,.94);
}
.title-btn:hover{
  background:linear-gradient(180deg,rgba(110,70,35,.8) 0%,rgba(70,40,20,.9) 100%);
  border-color:#d4a853;
  color:#f0e0b8;
  box-shadow:
    0 0 25px rgba(212,168,83,.25),
    0 0 50px rgba(212,168,83,.1),
    inset 0 1px 0 rgba(255,240,200,.15),
    0 8px 25px rgba(0,0,0,.4);
  transform:translateY(-3px);
}
.title-btn:hover::after{transform:translateX(100%)}
.title-btn:active{transform:translateY(-1px)}
/* 沉浸 3D 入口：青贝母虹彩光泽 */
.title-btn-3d{
  background:linear-gradient(180deg,rgba(35,70,80,.75) 0%,rgba(20,45,55,.85) 100%);
  border-color:rgba(100,180,175,.45);
  color:#a8d8d4;
  margin-top:.5rem;
}
.title-btn-3d::before{
  content:'❖';position:absolute;left:22px;top:50%;transform:translateY(-50%);
  color:#7ac8c0;font-size:1rem;letter-spacing:0;
  text-shadow:0 0 10px rgba(100,180,175,.6);
}
.title-btn-3d:hover{
  background:linear-gradient(180deg,rgba(55,100,115,.8) 0%,rgba(30,65,80,.9) 100%);
  border-color:#7ac8c0;
  color:#c8f0ec;
  box-shadow:
    0 0 30px rgba(100,180,175,.3),
    0 0 60px rgba(100,180,175,.12),
    inset 0 1px 0 rgba(180,230,225,.15),
    0 8px 25px rgba(0,0,0,.4);
}
/* 贝壳装饰 - 纯CSS螺钿虹彩效果 */
.title-shell{
  position:absolute;
  width:90px;
  height:125px;
  opacity:.55;
  z-index:3;
  pointer-events:none;
}
.title-shell.left{
  left:8%;top:16%;
  animation:floatShell 11s ease-in-out infinite;
}
.title-shell.right{
  right:8%;top:19%;
  animation:floatShell 11s ease-in-out infinite reverse;
}
.shell-body{
  position:relative;
  width:100%;
  height:100%;
  /* 更像螺钿贝片的形状：花瓣/水滴形 */
  border-radius: 50% 50% 50% 50% / 72% 72% 28% 28%;
  background:
    radial-gradient(ellipse at 28% 22%, rgba(255,252,242,.55) 0%, rgba(255,242,215,.38) 18%, rgba(235,205,168,.28) 42%, rgba(190,200,210,.2) 68%, rgba(150,170,190,.12) 100%);
  border:1px solid rgba(212,168,83,.38);
  box-shadow:
    inset 0 0 35px rgba(255,245,210,.12),
    inset 2px 3px 12px rgba(255,255,255,.08),
    0 10px 30px rgba(0,0,0,.35);
  overflow:hidden;
}
/* 贝壳纹理线 - 更自然的生长纹 */
.shell-body::before{
  content:'';
  position:absolute;
  top:6%;
  left:12%;
  right:12%;
  bottom:6%;
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 10px,
      rgba(212,168,83,.07) 10px,
      rgba(212,168,83,.07) 11px
    );
  border-radius: 50% 50% 50% 50% / 72% 72% 28% 28%;
}
/* 动态虹彩光泽 */
.shell-iridescence{
  position:absolute;
  inset:0;
  border-radius: 50% 50% 50% 50% / 72% 72% 28% 28%;
  background:
    conic-gradient(from 0deg at 50% 50%,
      rgba(255,195,215,.14),
      rgba(195,225,255,.14),
      rgba(195,255,215,.11),
      rgba(255,238,195,.16),
      rgba(255,220,235,.12),
      rgba(255,195,215,.14)
    );
  animation:iridescenceShift 9s ease-in-out infinite;
  mix-blend-mode:screen;
}
@keyframes iridescenceShift{
  0%,100%{transform:rotate(0deg);opacity:.6}
  33%{transform:rotate(120deg);opacity:.8}
  66%{transform:rotate(240deg);opacity:.7}
}
/* 珍珠高光 */
.shell-highlight{
  position:absolute;
  top:12%;
  left:18%;
  width:35%;
  height:30%;
  background:radial-gradient(ellipse at center, rgba(255,255,255,.6) 0%, rgba(230,245,255,.2) 50%, transparent 70%);
  border-radius:50%;
  filter:blur(3px);
  animation:highlightPulse 4s ease-in-out infinite;
}
@keyframes highlightPulse{
  0%,100%{opacity:.6;transform:scale(1)}
  50%{opacity:.9;transform:scale(1.15) translate(2px,-2px)}
}
@keyframes floatShell{
  0%,100%{transform:translateY(0) rotate(-6deg);opacity:.45}
  50%{transform:translateY(-25px) rotate(6deg);opacity:.7}
}
/* 底部诗句 */
.title-hint{
  position:absolute;bottom:2.5rem;
  color:#7a6040;
  font-size:.9rem;
  letter-spacing:.4em;
  z-index:5;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  animation:hintFade 4s ease-in-out infinite;
  font-style:italic;
}
.title-hint::before,.title-hint::after{
  content:'︱';color:rgba(212,168,83,.4);margin:0 1.2em;
}
@keyframes hintFade{
  0%,100%{opacity:.4}
  50%{opacity:.8}
}
/* 版本标识 */
.title-version{
  position:absolute;top:2rem;right:2.5rem;
  color:#5a4530;font-size:.7rem;letter-spacing:.2em;
  z-index:5;opacity:.6;
}
/* 进入动画延迟 */
.title-btns .title-btn:nth-child(1){animation:btnIn .6s cubic-bezier(.25,.46,.45,.94) .7s both}
.title-btns .title-btn:nth-child(2){animation:btnIn .6s cubic-bezier(.25,.46,.45,.94) .8s both}
.title-btns .title-btn:nth-child(3){animation:btnIn .6s cubic-bezier(.25,.46,.45,.94) .9s both}
.title-btns .title-btn:nth-child(4){animation:btnIn .6s cubic-bezier(.25,.46,.45,.94) 1.0s both}
.title-btns .title-btn:nth-child(5){animation:btnIn .6s cubic-bezier(.25,.46,.45,.94) 1.1s both}
.title-btns .title-btn:nth-child(6){animation:btnIn .6s cubic-bezier(.25,.46,.45,.94) 1.2s both}
@keyframes btnIn{
  from{opacity:0;transform:translateY(20px) scaleX(.95)}
  to{opacity:1;transform:translateY(0) scaleX(1)}
}

#game-scene{position:absolute;inset:0;z-index:5}
.scene{position:absolute;inset:0}
.scene-bg{position:absolute;inset:0}

.dialogue-box{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(20,12,6,.98) 0%,rgba(20,12,6,.92) 60%,rgba(20,12,6,.6) 85%,transparent 100%);padding:2.5rem 1.5rem 1.5rem;z-index:20;min-height:220px;cursor:pointer}
.dialogue-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(212,168,83,.3),rgba(212,168,83,.6),rgba(212,168,83,.3),transparent)}
.dialogue-box::after{content:'';position:absolute;top:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,83,.15),transparent)}
.speaker{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem}
.speaker-avatar{width:48px;height:48px;border-radius:50%;border:2px solid #d4a853;background:radial-gradient(circle,#5a3a20,#2a1810);display:flex;align-items:center;justify-content:center;font-size:1.5rem;overflow:hidden;box-shadow:0 0 15px rgba(212,168,83,.2)}
.speaker-name{font-size:1.1rem;color:#d4a853;letter-spacing:.2em;text-shadow:0 0 10px rgba(212,168,83,.3)}
.dialogue-text{font-size:1.05rem;line-height:2;color:#c9b896;max-width:900px;margin:0 auto 1rem;min-height:3.5em;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.dialogue-options{display:flex;flex-direction:column;gap:.6rem;max-width:700px;margin:0 auto}
.dialogue-opt{background:rgba(60,35,20,.7);border:1px solid rgba(200,160,100,.3);color:#c9b896;padding:12px 24px;font-size:1rem;letter-spacing:.1em;text-align:left;border-radius:2px;position:relative;padding-left:40px;transition:all .3s cubic-bezier(.4,0,.2,1)}
.dialogue-opt::before{content:'◆';position:absolute;left:16px;color:#8a6a3a;font-size:.7rem;top:50%;transform:translateY(-50%);transition:all .3s}
.dialogue-opt:hover{background:rgba(80,50,25,.85);border-color:#d4a853;color:#e8d5b0;transform:translateX(5px);box-shadow:0 2px 15px rgba(212,168,83,.15)}
.dialogue-opt:hover::before{color:#d4a853;text-shadow:0 0 8px rgba(212,168,83,.5)}
.dialogue-continue{text-align:center;color:#8a6a3a;font-size:.9rem;margin-top:.5rem;animation:hintBlink 1.5s ease-in-out infinite;letter-spacing:.2em}
.dlg-skip{position:absolute;top:1.2rem;right:1.2rem;background:rgba(60,35,20,.6);border:1px solid rgba(200,160,100,.25);color:#a89070;padding:6px 14px;font-size:.76rem;letter-spacing:.12em;border-radius:2px;cursor:pointer;transition:all .25s;z-index:21}
.dlg-skip:hover{background:rgba(100,65,30,.8);border-color:#d4a853;color:#e8d5b0;box-shadow:0 0 12px rgba(212,168,83,.15)}
.dlg-bookmark{position:absolute;top:1.2rem;right:7.6rem;background:rgba(60,35,20,.6);border:1px solid rgba(200,160,100,.25);color:#a89070;padding:6px 14px;font-size:.76rem;letter-spacing:.12em;border-radius:2px;cursor:pointer;transition:all .25s;z-index:21}
.dlg-bookmark:hover{background:rgba(100,65,30,.8);border-color:#d4a853;color:#e8d5b0;box-shadow:0 0 12px rgba(212,168,83,.15)}
.dlg-bookmark.active{color:#d4a853;border-color:rgba(212,168,83,.6);background:rgba(80,50,20,.7)}

/* ===== 新手引导气泡 ===== */
.guide-tip{position:fixed;top:5rem;left:50%;transform:translateX(-50%) translateY(-20px);background:linear-gradient(135deg,rgba(60,35,20,.97),rgba(40,22,12,.98));border:1px solid rgba(212,168,83,.45);border-radius:6px;padding:1rem 1.6rem;box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 25px rgba(212,168,83,.15);z-index:70;max-width:420px;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:1rem}
.guide-tip.show{opacity:1;transform:translateX(-50%) translateY(0)}
.guide-tip-icon{font-size:1.5rem;flex-shrink:0}
.guide-tip-body{flex:1}
.guide-tip-title{font-size:.78rem;color:#d4a853;letter-spacing:.25em;margin-bottom:.2rem}
.guide-tip-text{font-size:.88rem;color:#c9b896;line-height:1.6}
.guide-tip-close{background:rgba(212,168,83,.15);border:1px solid rgba(212,168,83,.3);color:#e8d5b0;padding:5px 16px;font-size:.8rem;letter-spacing:.15em;border-radius:2px;cursor:pointer;white-space:nowrap}
.guide-tip-close:hover{background:rgba(212,168,83,.3);border-color:#d4a853}
.dialogue-continue::after{content:' 点击继续 ▼'}

.top-bar{position:absolute;top:0;left:0;right:0;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;z-index:25;background:linear-gradient(to bottom,rgba(20,12,6,.9),transparent)}
.top-btn{background:rgba(60,35,20,.6);border:1px solid rgba(200,160,100,.2);color:#a08060;padding:8px 16px;font-size:.85rem;letter-spacing:.15em;border-radius:2px}
.top-btn:hover{background:rgba(80,50,25,.7);border-color:#d4a853;color:#d4a853}
.chapter-info{color:#8a6a3a;font-size:.9rem;letter-spacing:.3em}

.mg-wrap{position:absolute;inset:0;background:rgba(10,6,3,.94);z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(4px)}
.mg-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(212,168,83,.05) 0%,transparent 70%);pointer-events:none}
.mg-title{font-size:1.5rem;color:#d4a853;letter-spacing:.3em;margin-bottom:1rem;text-shadow:0 0 20px rgba(212,168,83,.3)}
.mg-hint{color:#8a7050;font-size:.9rem;margin-top:1rem;text-align:center;letter-spacing:.15em;line-height:1.6;max-width:500px}
.mg-canvas-box{position:relative;width:460px;height:260px;border:2px solid rgba(212,168,83,.3);background:#1a0f08;border-radius:4px;overflow:hidden;box-shadow:0 0 30px rgba(0,0,0,.5),inset 0 0 20px rgba(0,0,0,.3)}
.mg-canvas{position:relative!important;display:block;cursor:crosshair;touch-action:none}
.mg-bar{width:100%;max-width:500px;height:6px;background:rgba(60,35,20,.8);border-radius:3px;margin-bottom:1rem;overflow:hidden}
.mg-bar-fill{height:100%;background:linear-gradient(90deg,#8a5a2a,#d4a853,#e8c878);width:0%;transition:width .3s;border-radius:3px;box-shadow:0 0 10px rgba(212,168,83,.4)}
.mg-pbar{position:absolute;bottom:8px;left:10%;right:10%;height:8px;background:rgba(60,35,20,.6);border-radius:4px;overflow:hidden}
.mg-pzone{position:absolute;left:40%;width:20%;height:100%;background:rgba(212,168,83,.3);border-radius:4px}
.mg-pfill{position:absolute;left:0;height:100%;width:0%;background:linear-gradient(90deg,#8a5a2a,#d4a853);border-radius:4px;transition:width .05s}
.mg-result{margin-top:1rem;font-size:1.1rem;letter-spacing:.2em;min-height:1.5em;text-shadow:0 0 10px rgba(0,0,0,.5)}
.mg-result.good{color:#6abf6a;text-shadow:0 0 15px rgba(106,191,106,.3)}
.mg-result.bad{color:#bf6a6a;text-shadow:0 0 15px rgba(191,106,106,.3)}
.mg-retry{margin-top:.8rem;background:rgba(80,50,25,.7);border:1px solid rgba(200,160,100,.3);color:#c9b896;padding:8px 24px;font-size:.9rem;letter-spacing:.2em;border-radius:2px}
.mg-retry:hover{background:rgba(100,65,30,.8);border-color:#d4a853;box-shadow:0 0 15px rgba(212,168,83,.2)}
.mg-restart{position:absolute;top:.9rem;right:1.2rem;background:rgba(60,35,20,.6);border:1px solid rgba(200,160,100,.25);color:#a89070;padding:6px 16px;font-size:.78rem;letter-spacing:.15em;border-radius:2px;cursor:pointer;transition:all .25s;z-index:5}
.mg-restart:hover{background:rgba(100,65,30,.75);border-color:#d4a853;color:#e8d5b0;box-shadow:0 0 12px rgba(212,168,83,.15)}
.mg-submit{margin-top:.8rem;background:rgba(25,60,35,.7);border:1px solid rgba(100,180,120,.4);color:#a8c9a0;padding:8px 24px;font-size:.9rem;letter-spacing:.2em;border-radius:2px}
.mg-submit:hover{background:rgba(30,80,45,.8);border-color:#80c890;box-shadow:0 0 15px rgba(120,200,140,.3)}
.mg-canvas-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,168,83,.04) 0%,transparent 50%);pointer-events:none;z-index:2}
.mg-canvas-box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,83,.3),transparent);pointer-events:none;z-index:2}
.mg-title::before,.mg-title::after{content:'✦';font-size:.7em;margin:0 .8em;opacity:.5;vertical-align:middle}
.mg-quality-bar{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem;width:100%;max-width:500px}
.mg-quality-label{font-size:.78rem;color:#8a7050;letter-spacing:.15em;white-space:nowrap}
.mg-quality-track{flex:1;height:4px;background:rgba(60,35,20,.6);border-radius:2px;position:relative;overflow:hidden}
.mg-quality-fill{height:100%;background:linear-gradient(90deg,#bf6a6a,#d4a853,#6abf6a);width:0%;border-radius:2px;transition:width .3s}
.mg-glow{position:absolute;inset:0;pointer-events:none;z-index:3;opacity:0;transition:opacity .5s;box-shadow:inset 0 0 40px rgba(212,168,83,.15)}
.mg-glow.active{opacity:1}
.mg-sparkle{position:absolute;width:4px;height:4px;background:#fff0c8;border-radius:50%;pointer-events:none;box-shadow:0 0 6px #ffd700,0 0 12px rgba(255,215,0,.5)}
.mg-step-indicator{display:flex;gap:.4rem;margin-bottom:1rem}
.mg-step{width:8px;height:8px;border-radius:50%;background:rgba(60,35,20,.6);transition:all .4s}
.mg-step.active{background:#d4a853;box-shadow:0 0 8px rgba(212,168,83,.6)}

.select-panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,6,3,.9);z-index:28;padding:1.5rem;backdrop-filter:blur(8px)}
.select-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(212,168,83,.08) 0%,transparent 60%);pointer-events:none}
.select-title{font-size:1.5rem;color:#d4a853;letter-spacing:.4em;margin-bottom:2rem;text-shadow:0 0 25px rgba(212,168,83,.3);position:relative}
.select-title::before,.select-title::after{content:'';position:absolute;top:50%;width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,83,.4))}
.select-title::before{right:calc(100% + 30px)}
.select-title::after{left:calc(100% + 30px);background:linear-gradient(90deg,rgba(212,168,83,.4),transparent)}
.select-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.2rem;max-width:750px;width:100%}
.select-card{background:linear-gradient(135deg,rgba(60,35,20,.8),rgba(40,22,12,.9));border:1px solid rgba(200,160,100,.25);border-radius:4px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.select-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,240,200,.05) 50%,transparent 60%);transform:translateX(-100%);transition:transform .6s;pointer-events:none}
.select-card:hover::before{transform:translateX(100%)}
.select-card:hover{border-color:#d4a853;transform:translateY(-6px);box-shadow:0 10px 40px rgba(212,168,83,.2),0 4px 15px rgba(0,0,0,.3)}
.select-card.selected{border-color:#d4a853;background:linear-gradient(135deg,rgba(100,65,30,.85),rgba(60,35,20,.9));box-shadow:0 0 25px rgba(212,168,83,.25),inset 0 0 20px rgba(212,168,83,.05)}
.select-card.selected::after{content:'✓';position:absolute;top:10px;right:10px;color:#d4a853;font-size:1.2rem;text-shadow:0 0 10px rgba(212,168,83,.5)}
.card-icon{width:70px;height:70px;margin:0 auto 1rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;border:2px solid rgba(212,168,83,.4);background:radial-gradient(circle,rgba(60,35,20,.8),rgba(30,18,8,.9));box-shadow:0 0 20px rgba(212,168,83,.1)}
.card-name{font-size:1.15rem;color:#d4a853;letter-spacing:.15em;margin-bottom:.5rem}
.card-desc{font-size:.82rem;color:#8a7050;line-height:1.6}
.select-confirm{margin-top:2.5rem;background:linear-gradient(135deg,rgba(139,90,43,.8),rgba(180,120,60,.9));border:1px solid #d4a853;color:#fff;padding:14px 60px;font-size:1.1rem;letter-spacing:.4em;border-radius:2px;opacity:.4;pointer-events:none;transition:all .4s;position:relative;overflow:hidden}
.select-confirm.active{opacity:1;pointer-events:auto;cursor:pointer;box-shadow:0 0 30px rgba(212,168,83,.3)}
.select-confirm.active:hover{box-shadow:0 0 40px rgba(212,168,83,.45),0 4px 20px rgba(0,0,0,.3);transform:translateY(-2px)}
.select-confirm.active:active{transform:translateY(0)}

.transition-overlay{position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s ease}
.transition-overlay::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,#1a0f08 0%,#0a0603 100%)}
.transition-overlay.active{opacity:1;pointer-events:auto}
.pearl-light{position:relative;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(255,240,200,.85) 0%,rgba(212,168,83,.4) 25%,rgba(180,120,60,.15) 50%,transparent 70%);animation:pearlExpand 1.8s ease-out forwards}
.transition-chapter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.8rem;letter-spacing:.6em;color:#d4a853;text-shadow:0 0 20px rgba(212,168,83,.6),0 0 40px rgba(212,168,83,.3);animation:chapterFade 1.8s ease-out forwards;z-index:2}
@keyframes chapterFade{0%{opacity:0;transform:translate(-50%,-30%)}40%{opacity:1;transform:translate(-50%,-50%)}70%{opacity:1;transform:translate(-50%,-50%)}100%{opacity:0;transform:translate(-50%,-70%)}}
@keyframes pearlExpand{0%{transform:scale(.3);opacity:.6}50%{transform:scale(1.5);opacity:.9}100%{transform:scale(2.5);opacity:0}}

#ending-scene{position:absolute;inset:0;background:linear-gradient(180deg,#1a0f08 0%,#0d0604 100%);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow-y:auto}
#ending-scene::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(212,168,83,.08) 0%,transparent 60%);pointer-events:none}
/* 完美结局专属：月夜银蓝光晕，呼应「珠光永续」意象 */
#ending-scene[data-ending="perfect"]::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 25%,rgba(180,210,255,.10) 0%,rgba(160,200,235,.05) 35%,transparent 65%);pointer-events:none;animation:moonPulse 6s ease-in-out infinite}
@keyframes moonPulse{0%,100%{opacity:.7}50%{opacity:1}}
.ending-title{font-size:clamp(1.8rem,5vw,2.8rem);color:#d4a853;letter-spacing:.5em;margin-bottom:1.5rem;text-shadow:0 0 40px rgba(212,168,83,.4),0 0 80px rgba(212,168,83,.15);position:relative}
.ending-title::before,.ending-title::after{content:'';position:absolute;top:50%;width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,83,.4))}
.ending-title::before{right:calc(100% + 30px)}
.ending-title::after{left:calc(100% + 30px);background:linear-gradient(90deg,rgba(212,168,83,.4),transparent)}
.ending-text{font-size:1.05rem;line-height:2.2;color:#c9b896;max-width:700px;text-align:justify;margin-bottom:2rem;padding:0 1rem;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.ending-score{display:flex;gap:2rem;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
.score-item{text-align:center;background:linear-gradient(135deg,rgba(60,35,20,.6),rgba(40,22,12,.8));border:1px solid rgba(200,160,100,.2);border-radius:4px;padding:1rem 1.5rem;min-width:110px}
.score-val{font-size:1.8rem;color:#d4a853;text-shadow:0 0 15px rgba(212,168,83,.3)}
.score-label{font-size:.8rem;color:#8a6a3a;letter-spacing:.2em;margin-top:.3rem}
.ending-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.end-btn{background:linear-gradient(135deg,rgba(139,90,43,.7),rgba(80,40,20,.8));border:1px solid rgba(212,168,83,.4);color:#e8d5b0;padding:12px 30px;font-size:1rem;letter-spacing:.2em;border-radius:2px;position:relative;overflow:hidden}
.end-btn:hover{border-color:#d4a853;box-shadow:0 0 25px rgba(212,168,83,.3);transform:translateY(-2px)}
.end-btn:active{transform:translateY(0)}
.end-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,240,200,.08) 50%,transparent 60%);transform:translateX(-100%);transition:transform .6s}
.end-btn:hover::after{transform:translateX(100%)}

#codex-overlay{position:absolute;inset:0;background:rgba(10,6,3,.97);z-index:45;display:flex;flex-direction:column;padding:1rem;overflow:hidden;backdrop-filter:blur(10px)}
#codex-overlay::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(212,168,83,.06) 0%,transparent 50%);pointer-events:none}
.codex-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;margin-bottom:1rem;position:relative}
.codex-title{font-size:1.6rem;color:#d4a853;letter-spacing:.5em;text-shadow:0 0 20px rgba(212,168,83,.3)}
.codex-close{background:rgba(80,50,25,.6);border:1px solid rgba(200,160,100,.3);color:#c9b896;width:42px;height:42px;border-radius:50%;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all .3s}
.codex-close:hover{background:rgba(120,70,30,.8);border-color:#d4a853;color:#d4a853;transform:rotate(90deg);box-shadow:0 0 15px rgba(212,168,83,.3)}
.codex-tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.codex-tab{background:rgba(60,35,20,.6);border:1px solid rgba(200,160,100,.2);color:#8a6a3a;padding:10px 24px;font-size:.9rem;letter-spacing:.2em;border-radius:2px;transition:all .3s}
.codex-tab.active{background:linear-gradient(135deg,rgba(100,65,30,.8),rgba(80,45,18,.9));border-color:#d4a853;color:#d4a853;box-shadow:0 0 15px rgba(212,168,83,.2)}
.codex-content{flex:1;overflow-y:auto;padding:0 1.5rem 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.2rem;align-content:start;position:relative}
.codex-item{background:linear-gradient(135deg,rgba(50,30,15,.85),rgba(30,18,8,.95));border:1px solid rgba(200,160,100,.2);border-radius:4px;padding:1.2rem;text-align:center;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.codex-item:hover:not(.locked){border-color:rgba(212,168,83,.5);transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.3),0 0 20px rgba(212,168,83,.1)}
.codex-item.locked{opacity:.4;filter:grayscale(.6)}
.codex-item-icon{font-size:2.5rem;margin-bottom:.7rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.codex-item-name{color:#d4a853;font-size:1.05rem;letter-spacing:.15em;margin-bottom:.5rem}
.codex-item-desc{color:#7a6040;font-size:.78rem;line-height:1.6}
.codex-frag{border-left:3px solid #d4a853;padding:1rem 1.2rem;margin-bottom:1rem;background:linear-gradient(90deg,rgba(60,35,20,.5),rgba(40,22,12,.3));border-radius:0 4px 4px 0;transition:all .3s}
.codex-frag:hover:not(.locked){border-left-color:#e8c878;background:linear-gradient(90deg,rgba(80,50,25,.6),rgba(50,30,15,.4));transform:translateX(3px)}
.codex-frag.locked{opacity:.3;border-left-color:#5a4020}
.frag-title{color:#d4a853;font-size:1rem;letter-spacing:.15em;margin-bottom:.5rem}
.frag-text{color:#9a8060;font-size:.85rem;line-height:1.8;font-style:italic}

#workshop-scene{position:absolute;inset:0;background:linear-gradient(180deg,#1a0f08,#0d0604);z-index:8;display:flex;flex-direction:column}
.wk-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid rgba(200,160,100,.1)}
.wk-title{font-size:1.3rem;color:#d4a853;letter-spacing:.3em}
.wk-body{flex:1;display:flex;overflow:hidden}
.wk-panel{width:260px;padding:1rem;border-right:1px solid rgba(200,160,100,.1);overflow-y:auto}
.wk-section{margin-bottom:1.5rem}
.wk-sec-title{color:#8a6a3a;font-size:.8rem;letter-spacing:.2em;margin-bottom:.6rem;padding-bottom:.3rem;border-bottom:1px solid rgba(200,160,100,.1)}
.wk-opt{background:rgba(60,35,20,.5);border:1px solid rgba(200,160,100,.15);color:#a08060;padding:8px 12px;font-size:.85rem;margin-bottom:.4rem;border-radius:2px;width:100%;text-align:left;letter-spacing:.1em}
.wk-opt:hover,.wk-opt.active{background:rgba(100,65,30,.6);border-color:#d4a853;color:#d4a853}
.wk-canvas-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative}

#settings-overlay{position:absolute;inset:0;background:rgba(10,6,3,.92);z-index:46;display:flex;align-items:center;justify-content:center;padding:2rem;backdrop-filter:blur(10px)}
.settings-panel{background:linear-gradient(135deg,rgba(40,24,12,.95),rgba(20,12,6,.98));border:1px solid rgba(212,168,83,.3);border-radius:6px;padding:2rem 2.5rem;max-width:480px;width:100%;box-shadow:0 0 40px rgba(0,0,0,.5)}
.settings-title{font-size:1.4rem;color:#d4a853;letter-spacing:.4em;text-align:center;margin-bottom:1.8rem;text-shadow:0 0 20px rgba(212,168,83,.3)}
.settings-item{margin-bottom:1.2rem}
.settings-label{color:#c9b896;font-size:.95rem;letter-spacing:.15em;margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center}
.settings-label span{color:#8a6a3a;font-size:.8rem}
.settings-row{display:flex;gap:.5rem;align-items:center}
.settings-btn{flex:1;background:rgba(60,35,20,.6);border:1px solid rgba(200,160,100,.25);color:#c9b896;padding:8px 12px;font-size:.85rem;letter-spacing:.1em;border-radius:2px;cursor:pointer;transition:all .3s}
.settings-btn:hover{background:rgba(80,50,25,.7);border-color:#d4a853}
.settings-btn.active{background:linear-gradient(135deg,rgba(100,65,30,.8),rgba(80,45,18,.9));border-color:#d4a853;color:#d4a853;box-shadow:0 0 10px rgba(212,168,83,.2)}
.settings-close{margin-top:1.5rem;width:100%;background:linear-gradient(135deg,rgba(139,90,43,.7),rgba(80,40,20,.8));border:1px solid rgba(212,168,83,.4);color:#e8d5b0;padding:12px;font-size:1rem;letter-spacing:.3em;border-radius:2px;cursor:pointer}
.settings-close:hover{border-color:#d4a853;box-shadow:0 0 20px rgba(212,168,83,.3)}
.settings-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,rgba(212,168,83,.5),rgba(60,35,20,.8));outline:none;cursor:pointer}
.settings-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#d4a853,#a08050);border:2px solid #e8c878;box-shadow:0 0 10px rgba(212,168,83,.5);cursor:pointer;transition:all .2s}
.settings-slider::-webkit-slider-thumb:hover{transform:scale(1.15);box-shadow:0 0 15px rgba(212,168,83,.7)}
.settings-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#d4a853,#a08050);border:2px solid #e8c878;box-shadow:0 0 10px rgba(212,168,83,.5);cursor:pointer}
.settings-slider-value{color:#d4a853;font-size:.85rem;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}

#log-overlay{position:absolute;inset:0;background:rgba(10,6,3,.95);z-index:46;display:flex;flex-direction:column;padding:1.5rem;backdrop-filter:blur(10px)}
.log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(200,160,100,.15)}
.log-search{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;max-width:800px;width:100%;margin:0 auto 1rem}
.log-search input{flex:1;background:rgba(60,35,20,.6);border:1px solid rgba(212,168,83,.25);border-radius:2px;padding:8px 14px;color:#e8d5b0;font-size:.85rem;letter-spacing:.05em;outline:none}
.log-search input:focus{border-color:rgba(212,168,83,.5);box-shadow:0 0 8px rgba(212,168,83,.1)}
.log-search input::placeholder{color:#6a5238}
.log-search-count{font-size:.75rem;color:#8a6a3a;letter-spacing:.1em;white-space:nowrap}
.log-title{font-size:1.4rem;color:#d4a853;letter-spacing:.4em;text-shadow:0 0 20px rgba(212,168,83,.3)}
.log-content{flex:1;overflow-y:auto;padding:1rem;max-width:800px;width:100%;margin:0 auto}
.log-item{margin-bottom:1rem;padding:.8rem 1rem;background:linear-gradient(90deg,rgba(60,35,20,.4),rgba(40,22,12,.2));border-left:2px solid rgba(212,168,83,.3);border-radius:0 4px 4px 0}
.log-item-speaker{color:#d4a853;font-size:.9rem;letter-spacing:.15em;margin-bottom:.3rem}
.log-item-text{color:#c9b896;font-size:.92rem;line-height:1.8}

#ui-layer{position:absolute;inset:0;z-index:35;pointer-events:none}
#ui-layer>*{pointer-events:auto}

.narration{text-align:center;color:#a08060!important;font-style:italic;letter-spacing:.15em!important}

.vignette{position:absolute;inset:0;box-shadow:inset 0 0 150px rgba(0,0,0,.7);pointer-events:none;z-index:15}

@media(max-width:600px){
.dialogue-box{padding:1rem 1rem 1rem;min-height:180px}
.dialogue-text{font-size:.95rem;line-height:1.8}
.speaker-avatar{width:40px;height:40px;font-size:1.2rem}
.select-grid{grid-template-columns:repeat(2,1fr);gap:.6rem}
.select-card{padding:.8rem}
.card-icon{width:45px;height:45px;font-size:1.3rem}
.wk-panel{width:200px}
}

/* ===== 成就提示 ===== */
.achv-toast{position:fixed;top:1.5rem;right:1.5rem;z-index:9999;display:flex;align-items:center;gap:1rem;background:linear-gradient(135deg,rgba(60,35,20,.96),rgba(40,22,12,.98));border:1px solid rgba(212,168,83,.5);border-radius:6px;padding:1rem 1.4rem;box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 25px rgba(212,168,83,.15);transform:translateX(120%);opacity:0;transition:all .5s cubic-bezier(.4,0,.2,1);max-width:320px}
.achv-toast.show{transform:translateX(0);opacity:1}
.achv-toast-icon{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,83,.2),rgba(60,35,20,.8));border:1px solid rgba(212,168,83,.4);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.achv-toast-title{font-size:.7rem;color:#d4a853;letter-spacing:.3em;margin-bottom:.2rem}
.achv-toast-name{font-size:1rem;color:#e8d5b0;letter-spacing:.1em;margin-bottom:.15rem}
.achv-toast-desc{font-size:.78rem;color:#8a7050;line-height:1.5}

/* ===== 成就面板 ===== */
.achv-panel{background:linear-gradient(145deg,rgba(42,24,16,.97),rgba(20,12,6,.98));border:1px solid rgba(212,168,83,.3);border-radius:8px;padding:2rem;max-width:680px;width:92%;max-height:80vh;overflow-y:auto;margin:auto}
.achv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(212,168,83,.15)}
.achv-title{font-family:"STKaiti","KaiTi",serif;font-size:1.4rem;color:#d4a853;letter-spacing:.3em}
.achv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.achv-card{background:rgba(60,35,20,.5);border:1px solid rgba(200,160,100,.15);border-radius:6px;padding:1.2rem;text-align:center;transition:all .3s}
.achv-card.unlocked{border-color:rgba(212,168,83,.4);background:linear-gradient(145deg,rgba(80,50,25,.5),rgba(42,24,16,.7))}
.achv-card.unlocked .achv-card-icon{filter:none;opacity:1}
.achv-card-icon{font-size:2rem;margin-bottom:.6rem;filter:grayscale(1);opacity:.3}
.achv-card-name{font-size:.95rem;color:#d4a853;letter-spacing:.1em;margin-bottom:.3rem}
.achv-card.unlocked .achv-card-name{color:#e8d5b0}
.achv-card-desc{font-size:.75rem;color:#8a7050;line-height:1.5}
.achv-card.locked .achv-card-name{color:#5a4530}
.achv-progress{text-align:center;color:#8a6a3a;font-size:.85rem;margin-bottom:1.2rem;letter-spacing:.1em}

/* ===== 工艺知识卡片 ===== */
.knowledge-card{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(10,6,3,.88);backdrop-filter:blur(8px);opacity:0;transition:opacity .4s;pointer-events:none}
.knowledge-card.show{opacity:1;pointer-events:auto}
.kc-inner{background:linear-gradient(145deg,rgba(50,28,16,.98),rgba(30,16,8,.99));border:1px solid rgba(212,168,83,.4);border-radius:10px;padding:2.2rem;max-width:460px;width:90%;transform:translateY(20px);transition:transform .4s cubic-bezier(.4,0,.2,1);box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(212,168,83,.1)}
.knowledge-card.show .kc-inner{transform:translateY(0)}
.kc-badge{display:inline-block;font-size:.7rem;color:#8a6a3a;letter-spacing:.4em;border:1px solid rgba(212,168,83,.2);padding:3px 14px;border-radius:10px;margin-bottom:1rem}
.kc-title{font-family:"STKaiti","KaiTi",serif;font-size:1.4rem;color:#d4a853;letter-spacing:.2em;margin-bottom:1rem;text-align:center}
.kc-body{color:#c9b896;font-size:.92rem;line-height:2;margin-bottom:1.2rem;text-indent:2em}
.kc-fact{background:rgba(212,168,83,.06);border-left:3px solid rgba(212,168,83,.4);padding:.8rem 1rem;border-radius:0 4px 4px 0;font-size:.82rem;color:#8a7050;line-height:1.8;margin-bottom:1.2rem}
.kc-btn{display:block;margin:0 auto;background:linear-gradient(135deg,rgba(139,90,43,.6),rgba(80,40,20,.8));border:1px solid rgba(212,168,83,.4);color:#e8d5b0;padding:10px 36px;font-size:.95rem;letter-spacing:.3em;border-radius:2px}
.kc-btn:hover{background:linear-gradient(135deg,rgba(180,120,60,.7),rgba(100,50,25,.9));border-color:#d4a853;box-shadow:0 0 15px rgba(212,168,83,.2)}

/* 知识卡片测验 */
.kc-quiz{margin-top:.5rem;padding-top:1rem;border-top:1px dashed rgba(212,168,83,.2)}
.kc-quiz-title{font-size:.72rem;color:#8a6a3a;letter-spacing:.3em;margin-bottom:.6rem;text-align:center}
.kc-quiz-q{font-size:.9rem;color:#e8d5b0;line-height:1.7;margin-bottom:.8rem;text-align:center}
.kc-quiz-opts{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.6rem}
.kc-quiz-opt{background:rgba(60,35,20,.5);border:1px solid rgba(200,160,100,.2);color:#c9b896;padding:8px 14px;font-size:.85rem;letter-spacing:.05em;border-radius:2px;cursor:pointer;transition:all .2s;text-align:left}
.kc-quiz-opt:hover:not(:disabled){background:rgba(80,50,25,.6);border-color:rgba(212,168,83,.4)}
.kc-quiz-opt:disabled{cursor:default}
.kc-quiz-opt.correct{background:rgba(60,90,40,.5);border-color:rgba(120,180,80,.5);color:#c0e0a0}
.kc-quiz-opt.wrong{background:rgba(120,50,40,.5);border-color:rgba(200,100,80,.5);color:#e0b0a0}
.kc-quiz-result{text-align:center;font-size:.85rem;min-height:1.5rem;margin-bottom:.6rem}
.kc-correct{color:#a0d080}
.kc-wrong{color:#e0a090}

/* ===== 存档槽面板 ===== */
.slot-panel{background:linear-gradient(145deg,rgba(42,24,16,.97),rgba(20,12,6,.98));border:1px solid rgba(212,168,83,.3);border-radius:8px;padding:2rem;max-width:480px;width:92%;margin:auto}
.slot-list{display:flex;flex-direction:column;gap:1rem}
.slot-card{background:rgba(60,35,20,.4);border:1px solid rgba(200,160,100,.15);border-radius:6px;padding:1.2rem 1.4rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.slot-card:hover{border-color:rgba(212,168,83,.4);background:rgba(80,50,25,.5);transform:translateX(4px)}
.slot-card.has-data{border-color:rgba(212,168,83,.2)}
.slot-num{font-family:"STKaiti","KaiTi",serif;font-size:1.1rem;color:#d4a853;letter-spacing:.3em;flex-shrink:0}
.slot-desc{color:#c9b896;font-size:.9rem;letter-spacing:.05em;flex:1;text-align:right;min-width:120px}
.slot-desc.empty{color:#5a4530}
.slot-time{font-size:.75rem;color:#8a7050;letter-spacing:.05em;flex-basis:100%;text-align:right}

/* ===== 三星评价 ===== */
.star{font-size:1.4rem;color:rgba(120,90,50,.3);letter-spacing:.15em;display:inline-block;transition:all .3s}
.star.on{color:#d4a853;text-shadow:0 0 10px rgba(212,168,83,.5);animation:starPop .4s cubic-bezier(.4,0,.2,1) both}
@keyframes starPop{0%{transform:scale(0) rotate(-180deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.mg-stars{margin-top:.5rem;letter-spacing:.1em;min-height:1.8em}
</style>
</head>

<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};else r={tl:r[0]||0,tr:r[1]||r[0]||0,br:r[2]||r[0]||0,bl:r[3]||r[0]||0};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();return this}}

/* ===== 高级感标题粒子效果系统 ===== */
(function(){
  var container = document.getElementById('title-particles');
  if(!container) return;
  var particles = [];
  var particleCount = 35;
  function createParticle() {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = Math.random() * 3 + 1;
    var duration = Math.random() * 12 + 10;
    var delay = Math.random() * 15;
    var left = Math.random() * 100;
    var drift = (Math.random() - 0.5) * 100;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = left + '%';
    p.style.setProperty('--drift', drift + 'px');
    p.style.animationDuration = duration + 's';
    p.style.animationDelay = delay + 's';
    p.style.opacity = Math.random() * 0.5 + 0.3;
    container.appendChild(p);
    return p;
  }
  for(var i = 0; i < particleCount; i++) {
    createParticle();
  }
})();

/* 贝壳装饰由动画循环drawTitleShells统一绘制，避免初始化重影 */

(function(){
var cv=document.getElementById('game-canvas'),ctx=cv.getContext('2d');
var W,H,DPR;
function roundRect(ctx,x,y,w,h,r){
ctx.beginPath();
ctx.moveTo(x+r,y);
ctx.lineTo(x+w-r,y);
ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);
ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);
ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);
ctx.quadraticCurveTo(x,y,x+r,y);
ctx.closePath();
}
/* 性能优化：默认限制DPR为1.5，低质量模式为1 - 安全访问G设置 */
function getDPR(){
  var lowQ = window.G && window.G.settings && window.G.settings.lowQuality;
  return lowQ?1:Math.min(window.devicePixelRatio||1,1.5);
}
function resize(){DPR=getDPR();W=window.innerWidth;H=window.innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);staticCache={}}

/* ===== 螺钿工坊背景图预加载 ===== */
var BG_IMG=new Image();
var BG_IMG_READY=false;
BG_IMG.onload=function(){BG_IMG_READY=true;staticCache={};console.log('[背景] 螺钿工坊背景图加载完成')};
BG_IMG.onerror=function(){console.warn('[背景] 背景图加载失败，使用代码绘制背景')};
BG_IMG.src='assets/images/螺钿工坊背景图.jpeg';
var _resizeTimer=null;
function onResize(){if(_resizeTimer)clearTimeout(_resizeTimer);_resizeTimer=setTimeout(function(){resize();_resizeTimer=null},150)}
window.addEventListener('resize',onResize);resize();

var G={scene:'title',chapter:'序章',dialogueIdx:0,dialogueTyping:false,typewriterTimer:null,
material:null,pattern:null,traceQuality:null,craftResult:null,fragments:[],
unlocked:{materials:[],patterns:[],crafts:[],fragments:[]},
charShown:{master:false,alian:false},
perf:{frameCount:0,lastFpsUpdate:0,fps:60,staticDrawn:{}},
ambient:{dustTimer:0,sparkleTimer:0,lightSway:0},
settings:{sound:true,music:true,soundVolume:70,musicVolume:60,textSpeed:28,autoMode:false,lowQuality:false},
dialogueLog:[],endingType:null,_autoTimer:null,achievements:[],readDialogues:[],ngPlus:false,guides:[],quizCorrect:0,quizAnswered:[],bookmarks:[]};
window.G=G;

var SAVE_KEY='xzzg_save_v3';
var SETTINGS_KEY='xzzg_settings';
var ACHV_KEY='xzzg_achievements_v1';

function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({material:G.material,pattern:G.pattern,traceQuality:G.traceQuality,_cutQuality:G._cutQuality,_polishQuality:G._polishQuality,_lacquerQuality:G._lacquerQuality,_assemblyQuality:G._assemblyQuality,_cutFail:G._cutFail,craftResult:G.craftResult,fragments:G.fragments,unlocked:G.unlocked,chapter:G.chapter,scene:G.scene,currentDialogue:G.currentDialogue,dialogueIdx:G.dialogueIdx,charShown:G.charShown,endingType:G.endingType,readDialogues:G.readDialogues,bookmarks:G.bookmarks,savedAt:Date.now()}))}catch(e){}}
function load(){try{var s=localStorage.getItem(SAVE_KEY);if(s){var d=JSON.parse(s);Object.assign(G,d);if(G.unlocked&&G.unlocked.materials)return true}}catch(e){}return false}
function hasSave(){try{return !!localStorage.getItem(SAVE_KEY)}catch(e){return false}}
function loadSettings(){try{var s=localStorage.getItem(SETTINGS_KEY);if(s){var d=JSON.parse(s);if(d&&typeof d==='object')Object.assign(G.settings,d)}}catch(e){}}
function saveSettings(){try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(G.settings))}catch(e){}}
function loadAchievements(){try{var s=localStorage.getItem(ACHV_KEY);if(s){var d=JSON.parse(s);if(Array.isArray(d))G.achievements=d}}catch(e){}}
function saveAchievements(){try{localStorage.setItem(ACHV_KEY,JSON.stringify(G.achievements))}catch(e){}}
function saveToSlot(n){try{var data={material:G.material,pattern:G.pattern,traceQuality:G.traceQuality,_cutQuality:G._cutQuality,_polishQuality:G._polishQuality,_lacquerQuality:G._lacquerQuality,_assemblyQuality:G._assemblyQuality,_cutFail:G._cutFail,craftResult:G.craftResult,fragments:G.fragments,unlocked:G.unlocked,chapter:G.chapter,scene:G.scene,currentDialogue:G.currentDialogue,dialogueIdx:G.dialogueIdx,charShown:G.charShown,endingType:G.endingType,readDialogues:G.readDialogues,bookmarks:G.bookmarks,savedAt:Date.now()};localStorage.setItem(SAVE_KEY+'_'+n,JSON.stringify(data));save();return true}catch(e){return false}}

var staticCache={};
var particles=[];
var MAX_PARTICLES=20;
/* 性能优化：大幅减少粒子数量，低质量模式进一步减少 - 安全访问G设置 */
function particleLimit(){
  var lowQ = window.G && window.G.settings && window.G.settings.lowQuality;
  if(lowQ)return 8;
  var area=window.innerWidth*window.innerHeight;
  return area>800000?20:area>400000?14:10;
}
var particlePool=[];

function acquireParticle(){
if(particles.length>=particleLimit())return null;
var p=particlePool.length>0?particlePool.pop():{};
return p;
}
function releaseParticle(p){
if(particlePool.length<50)particlePool.push(p);
}

function spawnParticle(x,y,type){
var p=acquireParticle();if(!p)return;
p.x=x;p.y=y;p.vx=(Math.random()-.5)*.4;p.vy=-Math.random()*.6-.1;p.life=1;p.decay=.006+Math.random()*.008;p.size=1+Math.random()*1.5;p.type=type||'dust';
if(type==='firefly'){p.vx=(Math.random()-.5)*.3;p.vy=(Math.random()-.5)*.2;p.decay=.003+Math.random()*.004;p.size=2+Math.random()*2;p.phase=Math.random()*Math.PI*2;p.twinkleSpeed=2+Math.random()*2}
else if(type==='glow'){p.vx=(Math.random()-.5)*.2;p.vy=-.1-Math.random()*.3;p.decay=.004+Math.random()*.006;p.size=3+Math.random()*3}
else if(type==='shell_spark'){p.vx=(Math.random()-.5)*.6;p.vy=-.3-Math.random()*.8;p.decay=.008+Math.random()*.01;p.size=1.5+Math.random()*2}
else if(type==='sparkle'){p.vx=(Math.random()-.5)*1.2;p.vy=(Math.random()-.5)*1.2;p.decay=.012+Math.random()*.015;p.size=2+Math.random()*2;p.phase=Math.random()*Math.PI*2}
else if(type==='petal'){p.vx=(Math.random()-.5)*.2+Math.sin(Date.now()/500)*.1;p.vy=.1+Math.random()*.2;p.decay=.002+Math.random()*.003;p.size=3+Math.random()*3;p.rotateSpeed=(Math.random()-.5)*.05}
particles.push(p);
}
function updateParticles(dt){
var wind=Math.sin(Date.now()/3000)*.15;
for(var i=particles.length-1;i>=0;i--){
var p=particles[i];
p.x+=p.vx*dt*60+wind*dt*60;p.y+=p.vy*dt*60;p.vy+=.003*dt*60;p.life-=p.decay*dt*60;
if(p.life<=0){var rem=particles.splice(i,1)[0];releaseParticle(rem)}
}
}
var _glowTexture=null;
function getGlowTexture(){
if(_glowTexture)return _glowTexture;
_glowTexture=document.createElement('canvas');_glowTexture.width=32;_glowTexture.height=32;
var gctx=_glowTexture.getContext('2d');
var g=gctx.createRadialGradient(16,16,0,16,16,16);
g.addColorStop(0,'rgba(255,240,180,1)');
g.addColorStop(.5,'rgba(255,240,180,.3)');
g.addColorStop(1,'transparent');
gctx.fillStyle=g;gctx.fillRect(0,0,32,32);
return _glowTexture;
}
function renderParticles(){
for(var i=0;i<particles.length;i++){
var p=particles[i];var a=p.life;
if(p.type==='dust'){ctx.fillStyle='rgba(255,240,180,'+(a*.25)+')';ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}
else if(p.type==='sparkle'){ctx.fillStyle='rgba(255,255,220,'+a+')';ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill()}
else if(p.type==='glow'){var tex=getGlowTexture();var sz=p.size*6;ctx.globalAlpha=Math.min(1,a*.5);ctx.drawImage(tex,p.x-sz/2,p.y-sz/2,sz,sz);ctx.globalAlpha=1}
else if(p.type==='firefly'){var twinkle=Math.sin(p.phase+p.twinkleSpeed*Date.now()/1000)*.5+.5;var fa=a*twinkle*.8;var fr=Math.max(1,p.size*2);ctx.fillStyle='rgba(255,255,180,'+fa+')';ctx.beginPath();ctx.arc(p.x,p.y,fr,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(200,255,150,'+(fa*.3)+')';ctx.beginPath();ctx.arc(p.x,p.y,fr*1.5,0,Math.PI*2);ctx.fill()}
else if(p.type==='shell_spark'){var sg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2);sg.addColorStop(0,'rgba(255,240,220,'+a+')');sg.addColorStop(.4,'hsla('+((Date.now()/50+p.x)%360)+',70%,75%,'+(a*.6)+')');sg.addColorStop(1,'transparent');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(p.x,p.y,p.size*2,0,Math.PI*2);ctx.fill()}
else if(p.type==='petal'){ctx.save();ctx.translate(p.x,p.y);if(p.rotateSpeed)p.rotation=(p.rotation||0)+p.rotateSpeed;ctx.rotate(p.rotation||0);ctx.fillStyle='rgba(255,200,220,'+(a*.6)+')';ctx.beginPath();ctx.ellipse(0,0,p.size,p.size*.5,0,0,Math.PI*2);ctx.fill();ctx.restore()}
}
}

function drawShell(c,x,y,w,h,type,rot){
ctx.save();ctx.translate(x,y);if(rot)ctx.rotate(rot);
var irColors;
if(type==='abalone')irColors=[[180,70,60],[280,60,55],[30,70,65],[120,50,55]];
else if(type==='luminous')irColors=[[50,80,70],[180,60,65],[260,50,60],[300,60,65]];
else irColors=[[30,60,75],[200,40,70],[340,50,70],[60,50,72]];
var baseG=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
baseG.addColorStop(0,'#f5e6c8');baseG.addColorStop(.5,'#e8d5a8');baseG.addColorStop(1,'#d4c098');
ctx.fillStyle=baseG;
ctx.beginPath();ctx.moveTo(0,-h/2);ctx.bezierCurveTo(w/2,-h/3,w*.45,h/3,0,h/2);ctx.bezierCurveTo(-w*.45,h/3,-w/2,-h/3,0,-h/2);ctx.closePath();ctx.fill();
var t=Date.now()/2000;
var irG=ctx.createRadialGradient(0,0,w*.1,0,0,w*.6);
for(var i=0;i<irColors.length;i++){var c2=irColors[i],hp=((t+i*.25)%1);irG.addColorStop(hp,'hsla('+c2[0]+','+c2[1]+'%,'+c2[2]+'%,.15)')}
irG.addColorStop(1,'transparent');
ctx.fillStyle=irG;ctx.fill();
ctx.strokeStyle='rgba(180,150,100,.25)';ctx.lineWidth=.5;

ctx.restore();
}

var _2dLastRender=0,_2dMinInterval=1000/40;

/* 帧率限制 */

}

/* ===== 背景音乐系统 —— 固定使用 bgm_dianguang.mp3，唯一一首BGM ===== */
var MusicSys={
currentMood:null,started:false,
bgm:null,bgmLoaded:false,bgmLoading:false,
/* 不同场景仅微调音量，始终播放同一首BGM */
moodVolumes:{title:0.45,prologue:0.40,craft:0.35,ending:0.50},
_initAudio:function(){
  if(this.bgm)return this.bgm;
  var self=this;
  /* 创建唯一的audio元素 */
  var audio=new Audio();
  audio.loop=true;
  audio.preload='auto';
  audio.crossOrigin='anonymous';
  this.bgm=audio;
  
  /* 尝试多个路径加载，确保兼容性 */
  var tryPaths=['assets/audio/bgm_dianguang.mp3','assets/bgm_dianguang.mp3','bgm_dianguang.mp3'];
  var pathIdx=0;
  
  function tryLoadNext(){
    if(pathIdx>=tryPaths.length){
      console.warn('[MusicSys] 所有BGM路径加载失败');
      self.bgmLoading=false;
      return;
    }
    console.log('[MusicSys] 尝试加载BGM:',tryPaths[pathIdx]);
    self.bgmLoading=true;
    
    /* 清除之前的事件监听 */
    audio.onerror=null;
    audio.oncanplaythrough=null;
    
    audio.oncanplaythrough=function(){
      self.bgmLoaded=true;
      self.bgmLoading=false;
      console.log('[MusicSys] BGM加载成功:',tryPaths[pathIdx]);
      /* 如果已经调用过play，加载完成后立即播放 */
      if(self.started){
        self._applyVolume();
        self._tryPlay();
      }
    };
    audio.onerror=function(){
      console.warn('[MusicSys] BGM加载失败，尝试下一个路径:',tryPaths[pathIdx]);
      pathIdx++;
      tryLoadNext();
    };
    
    try{
      audio.src=tryPaths[pathIdx];
      audio.load();
    }catch(e){
      pathIdx++;
      tryLoadNext();
    }
  }
  
  tryLoadNext();
  return audio;
},
_tryPlay:function(){
  if(!this.bgm||!this.bgmLoaded)return;
  var self=this;
  try{
    var promise=this.bgm.play();
    if(promise!==undefined){
      promise.catch(function(err){
        console.log('[MusicSys] 需要用户交互后才能播放BGM');
        /* 在第一次用户交互时重试播放 */
        if(!self._interactionBound){
          self._interactionBound=true;
          var onInteract=function(){
            document.removeEventListener('click',onInteract);
            document.removeEventListener('touchstart',onInteract);
            document.removeEventListener('keydown',onInteract);
            self._tryPlay();
          };
          document.addEventListener('click',onInteract,{once:true});
          document.addEventListener('touchstart',onInteract,{once:true});
          document.addEventListener('keydown',onInteract,{once:true});
        }
      });
    }
  }catch(e){
    console.warn('[MusicSys] 播放异常:',e);
  }
},
_applyVolume:function(){
  if(!this.bgm)return;
  var vol=G.settings.musicVolume!==undefined?G.settings.musicVolume/100:0.6;
  var targetVol=(this.moodVolumes[this.currentMood]||0.40)*vol;
  this.bgm.volume=targetVol;
},
setVolume:function(v){
  if(!this.bgm)this._initAudio();
  this._applyVolume();
},
play:function(mood){
  if(!G.settings.music)return;
  this.currentMood=mood;
  this.started=true;
  if(!this.bgm)this._initAudio();
  this._applyVolume();
  if(this.bgmLoaded){
    this._tryPlay();
  }
},
stop:function(){
  this.started=false;
  if(this.bgm){
    var self=this;
    /* 渐隐后暂停 */
    var startVol=this.bgm.volume;
    var steps=20;
    var step=0;
    var fadeInt=setInterval(function(){
      step++;
      self.bgm.volume=startVol*(1-step/steps);
      if(step>=steps){
        clearInterval(fadeInt);
        self.bgm.pause();
        self.bgm.volume=startVol;
      }
    },30);
  }
}
};
/* 页面加载时立即预加载BGM */
(function(){
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){MusicSys._initAudio()});
  }else{
    MusicSys._initAudio();
  }
})();

function spawnShellSparks(){for(var i=0;i<8;i++)setTimeout(function(){var bx=W*.5,by=H*.5;spawnParticle(bx+(Math.random()-.5)*80,by+(Math.random()-.5)*50,'sparkle')},i*60)}

function setChapter(name){G.chapter=name;var el=document.getElementById('chapter-label');if(el)el.textContent=name;staticCache={}}

function findValidDialogueIdx(arr,startIdx){
var idx=startIdx;
while(idx<arr.length){
var d=arr[idx];
if(!d||!d.cond||d.cond())break;
idx++;
}
return idx;
}

function dialogueShowOne(){
var arr=dialogues[G.currentDialogue];if(!arr)return;
var d=arr[G.dialogueIdx];
if(d&&d.cond&&!d.cond()){dialogueAdvance();return}
if(!d){return}
var box=document.getElementById('dialogue-box');box.classList.remove('hidden');
if(G.currentDialogue==='prologue'&&G.dialogueIdx===0){setTimeout(function(){showGuide('dialogue','操作指引','点击对话框或空白处推进剧情，右上角「⏭跳过已读」可快速略过已看过的对话','💡')},800)}
document.getElementById('speaker-av').textContent=d.avatar||(d.speaker==='旁白'?'📜':'💬');
document.getElementById('speaker-name').textContent=d.speaker;
document.getElementById('dialogue-text').className='dialogue-text'+(d.speaker==='旁白'?' narration':'');
document.getElementById('dialogue-options').classList.add('hidden');
document.getElementById('dialogue-continue').classList.remove('hidden');
if(d.onShow)d.onShow();
/* 3D 镜头切换：显式 d.camera 字段优先；否则说话人变化时自动正反打 */
if(window.Cast3D && window.Cast3D.isReady){
if(d.camera){
window.Cast3D.transitionTo(d.camera, 1.0);
}else if(G._lastDlgSpeaker !== d.speaker){
var _autoCam = d.speaker==='老匠人'?'master_bust':
(d.speaker==='阿莲'?'alian_bust':
(d.speaker==='旁白'?'wide':'two_shot'));
window.Cast3D.transitionTo(_autoCam, 0.8);
}

wrap.innerHTML='<div class="mg-title">拓 样 描 线</div><button class="mg-restart" id="t-restart">⟲ 重新开始</button><div class="mg-quality-bar"><span class="mg-quality-label">精准度</span><div class="mg-quality-track"><div class="mg-quality-fill" id="t-quality"></div></div></div><div class="mg-bar"><div class="mg-bar-fill" id="t-bar"></div></div><div class="mg-canvas-box" style="width:'+cw+'px;height:'+ch+'px"><div class="mg-glow" id="t-glow"></div></div><div class="mg-hint">✦ 按住鼠标或手指，沿金色虚线纹样缓缓描绘<br>✦ 线条越贴合虚线，精准度越高<br>✦ 进度达到 60% 即可完成描样</div><div class="mg-result" id="t-res"></div><button class="mg-retry hidden" id="t-retry">重 新 描 样</button><button class="mg-submit hidden" id="t-submit">完 成 描 样</button>';
wrap.querySelector('.mg-canvas-box').appendChild(tcv);
ui.appendChild(wrap);
var tctx=tcv.getContext('2d');
var tw=tcv.width,th=tcv.height;
var drawnPoints=[];
var cx=tw/2,cy=th/2;
var patternPoints=[];
if(G.pattern==='lotus'){
for(var a=0;a<Math.PI*5;a+=.06){var r=60+20*Math.sin(a*2.5);patternPoints.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r*.7})}
}else if(G.pattern==='magpie'){
patternPoints.push({x:cx-80,y:cy+20});
for(var i=0;i<20;i++){var t=i/19;patternPoints.push({x:cx-80+t*60,y:cy+20-Math.sin(t*Math.PI)*30})}
patternPoints.push({x:cx-20,y:cy-10});
for(var i=0;i<28;i++){var t=i/27;patternPoints.push({x:cx-20+Math.cos(t*Math.PI-.5)*55,y:cy-10-Math.sin(t*Math.PI-.5)*42})}
for(var i=0;i<18;i++){var t=i/17;patternPoints.push({x:cx+35+t*40,y:cy-52+t*15})}
}else{
for(var a=0;a<Math.PI*4;a+=.05){var r=75+16*Math.sin(a*4);patternPoints.push({x:cx+Math.cos(a)*r*.85,y:cy+Math.sin(a)*r*.65})}
}
var totalLen=0;
for(var i=1;i<patternPoints.length;i++){var dx=patternPoints[i].x-patternPoints[i-1].x,dy=patternPoints[i].y-patternPoints[i-1].y;totalLen+=Math.sqrt(dx*dx+dy*dy)}
var _tracingRaf=null;
var sparkles=[];
function addSparkle(x,y){sparkles.push({x:x,y:y,life:1,size:2+Math.random()*3,vx:(Math.random()-.5)*2,vy:-Math.random()*2-1})}
function drawPattern(){
tctx.fillStyle='#1a0f08';tctx.fillRect(0,0,tw,th);
tctx.strokeStyle='rgba(212,168,83,.25)';tctx.lineWidth=1;
for(var i=0;i<8;i++){tctx.beginPath();tctx.moveTo(0,i*th/8+.5);tctx.lineTo(tw,i*th/8+.5);tctx.stroke()}
for(var i=0;i<12;i++){tctx.beginPath();tctx.moveTo(i*tw/12+.5,0);tctx.lineTo(i*tw/12+.5,th);tctx.stroke()}
tctx.strokeStyle='rgba(255,220,150,.5)';tctx.lineWidth=8;tctx.lineCap='round';tctx.lineJoin='round';
tctx.beginPath();tctx.moveTo(patternPoints[0].x,patternPoints[0].y);
for(var i=1;i<patternPoints.length;i++)tctx.lineTo(patternPoints[i].x,patternPoints[i].y);
tctx.stroke();
tctx.strokeStyle='rgba(212,168,83,.6)';tctx.lineWidth=2;tctx.setLineDash([6,4]);
tctx.beginPath();tctx.moveTo(patternPoints[0].x,patternPoints[0].y);
for(var i=1;i<patternPoints.length;i++)tctx.lineTo(patternPoints[i].x,patternPoints[i].y);
tctx.stroke();tctx.setLineDash([]);
tctx.fillStyle='rgba(255,240,200,.8)';tctx.beginPath();tctx.arc(patternPoints[0].x,patternPoints[0].y,5,0,Math.PI*2);tctx.fill();
tctx.fillStyle='#d4a853';tctx.font='11px serif';tctx.textAlign='center';tctx.fillText('起笔',patternPoints[0].x,patternPoints[0].y-10);
if(drawnPoints.length>1){
tctx.strokeStyle='rgba(255,240,180,.3)';tctx.lineWidth=6;tctx.lineCap='round';tctx.lineJoin='round';
tctx.beginPath();tctx.moveTo(drawnPoints[0].x,drawnPoints[0].y);
for(var i=1;i<drawnPoints.length;i++)tctx.lineTo(drawnPoints[i].x,drawnPoints[i].y);
tctx.stroke();
tctx.strokeStyle='rgba(255,248,220,.95)';tctx.lineWidth=3;tctx.lineCap='round';tctx.lineJoin='round';
tctx.beginPath();tctx.moveTo(drawnPoints[0].x,drawnPoints[0].y);
for(var i=1;i<drawnPoints.length;i++)tctx.lineTo(drawnPoints[i].x,drawnPoints[i].y);
tctx.stroke();
}
for(var i=sparkles.length-1;i>=0;i--){var sp=sparkles[i];sp.life-=.03;sp.x+=sp.vx;sp.y+=sp.vy;sp.vy+=.05;
if(sp.life<=0){sparkles.splice(i,1);continue}
tctx.fillStyle='rgba(255,240,180,'+sp.life+')';tctx.beginPath();tctx.arc(sp.x,sp.y,sp.size*sp.life,0,Math.PI*2);tctx.fill();
tctx.strokeStyle='rgba(255,215,100,'+(sp.life*.5)+')';tctx.lineWidth=1;tctx.beginPath();tctx.arc(sp.x,sp.y,sp.size*sp.life*2,0,Math.PI*2);tctx.stroke();
}
var drawnLen=0;
for(var i=1;i<drawnPoints.length;i++){var dx=drawnPoints[i].x-drawnPoints[i-1].x,dy=drawnPoints[i].y-drawnPoints[i-1].y;drawnLen+=Math.sqrt(dx*dx+dy*dy)}
var pct=Math.min(drawnLen/totalLen*100,100);
var bar=document.getElementById('t-bar');if(bar)bar.style.width=pct+'%';
var deviation=0,samples=0;
for(var i=0;i<drawnPoints.length;i++){
var minD=999;
for(var j=0;j<patternPoints.length;j++){
var dx2=drawnPoints[i].x-patternPoints[j].x,dy2=drawnPoints[i].y-patternPoints[j].y;
var d=Math.sqrt(dx2*dx2+dy2*dy2);
if(d<minD)minD=d;
}
deviation+=minD;samples++;
}
var avgDev=samples>0?deviation/samples:30;
var qualityPct=Math.max(0,Math.min(100,(30-avgDev)/30*100));
var qbar=document.getElementById('t-quality');if(qbar)qbar.style.width=qualityPct+'%';
var glow=document.getElementById('t-glow');if(glow)glow.classList.toggle('active',qualityPct>70);
var submitBtn=document.getElementById('t-submit');
if(submitBtn){submitBtn.classList.toggle('hidden',pct<60)}
}
function tracingRafLoop(){

_tracingRaf=requestAnimationFrame(tracingRafLoop);
}
_tracingRaf=requestAnimationFrame(tracingRafLoop);
var drawing=false;
function getPos(e){var r=tcv.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(tw/r.width),y:(t.clientY-r.top)*(th/r.height)}}
function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);drawnPoints=[p];AudioSys.click()}
function onMove(e){if(!drawing)return;e.preventDefault();var p=getPos(e);var last=drawnPoints[drawnPoints.length-1];var dx=p.x-last.x,dy=p.y-last.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<3)return;drawnPoints.push(p);
if(Math.random()<.3)addSparkle(p.x,p.y)}
function onUp(){if(!drawing)return;drawing=false;AudioSys.click()}
tcv.addEventListener('mousedown',onDown);tcv.addEventListener('mousemove',onMove);tcv.addEventListener('mouseup',onUp);tcv.addEventListener('mouseleave',onUp);
tcv.addEventListener('touchstart',onDown,{passive:false});tcv.addEventListener('touchmove',onMove,{passive:false});tcv.addEventListener('touchend',onUp);
function finishTracing(){
var drawnLen=0;
for(var i=1;i<drawnPoints.length;i++){var dx=drawnPoints[i].x-drawnPoints[i-1].x,dy=drawnPoints[i].y-drawnPoints[i-1].y;drawnLen+=Math.sqrt(dx*dx+dy*dy)}
var pct=drawnLen/totalLen*100;
var deviation=0,samples=0;
for(var i=0;i<drawnPoints.length;i++){
var minD=999;
for(var j=0;j<patternPoints.length;j++){
var dx2=drawnPoints[i].x-patternPoints[j].x,dy2=drawnPoints[i].y-patternPoints[j].y;
var d=Math.sqrt(dx2*dx2+dy2*dy2);
if(d<minD)minD=d;
}
deviation+=minD;samples++;
}
var avgDev=samples>0?deviation/samples:50;
if(avgDev<18&&pct>=85)G.traceQuality='excellent';
else if(avgDev<35&&pct>=60)G.traceQuality='pass';
else G.traceQuality='fail';
var res=document.getElementById('t-res');
if(G.traceQuality==='excellent'){res.innerHTML='✦ 线条流畅，一气呵成 ✦<div class="mg-stars">'+qualityStars(G.traceQuality)+'</div>';res.className='mg-result good';AudioSys.success();spawnShellSparks()}

else{res.textContent='线条偏差较大，请重试';res.className='mg-result bad';AudioSys.fail();document.getElementById('t-retry').classList.remove('hidden');return}
setTimeout(function(){if(_tracingRaf){cancelAnimationFrame(_tracingRaf);_tracingRaf=null}wrap.remove();if(G.dialogueTyping){skipType()}showKnowledgeCard('tracing',function(){dialogueAdvance()})},1600);
}

setTimeout(function(){showGuide('lacquering','髹漆上底','按住拖动漆刷均匀涂满木胎，来回涂刷即可。偶尔有灰尘飘落，涂刷时顺手带走','🖌️')},500);
var ui=document.getElementById('ui-layer');
var wrap=document.createElement('div');wrap.className='mg-wrap';
var cw=Math.min(460,W*.88),ch=250;
var lcv=document.createElement('canvas');lcv.className='mg-canvas';lcv.id='l-cv';lcv.width=cw;lcv.height=ch;lcv.style.width=cw+'px';lcv.style.maxWidth='100%';lcv.style.touchAction='none';
wrap.innerHTML='<div class="mg-title">髹 漆 上 底</div><button class="mg-restart" id="l-restart">⟲ 重新开始</button><div class="mg-quality-bar"><span class="mg-quality-label">均匀度</span><div class="mg-quality-track"><div class="mg-quality-fill" id="l-quality"></div></div></div><div class="mg-bar"><div class="mg-bar-fill" id="l-bar"></div></div><div class="mg-canvas-box" style="width:'+cw+'px;height:'+ch+'px"><div class="mg-glow" id="l-glow"></div></div><div class="mg-hint">✦ 按住鼠标/手指拖动漆刷，均匀涂满木胎<br>✦ 来回涂刷1-2遍即可，不要涂得太厚<br>✦ 有灰尘飘落时，用漆刷顺手带走</div><div class="mg-result" id="l-res"></div><button class="mg-retry hidden" id="l-retry">重 新 髹 漆</button><button class="mg-submit hidden" id="l-submit">完 成 髹 漆</button>';
wrap.querySelector('.mg-canvas-box').appendChild(lcv);
ui.appendChild(wrap);
var lctx=lcv.getContext('2d');
var lw=lcv.width,lh=lcv.height;
var gridW=12,gridH=8,cellW=(lw-40)/gridW,cellH=(lh-40)/gridH;
var grid=[];for(var y=0;y<gridH;y++){grid[y]=[];for(var x=0;x<gridW;x++)grid[y][x]=0}
var painting=false,lacquerDone=false,lacquerFinished=false;
var lastLPoint=null,curLPoint=null;
var dusts=[],dustTimer=0,dustInterval=7;
var lacquerSparkles=[];
function addLacquerSparkle(x,y){lacquerSparkles.push({x:x,y:y,life:1,size:1.5+Math.random()*2,vx:(Math.random()-.5)*1.5,vy:-Math.random()*1.5-.5})}
function drawLacquer(){
lctx.fillStyle='#1a0f08';lctx.fillRect(0,0,lw,lh);
var ox=20,oy=20,w=lw-40,h=lh-40;
lctx.fillStyle='#2d1c10';lctx.fillRect(ox,oy,w,h);
lctx.strokeStyle='rgba(120,80,50,.2)';lctx.lineWidth=1;
for(var wy=0;wy<8;wy++){lctx.beginPath();lctx.moveTo(ox,oy+wy*h/8+h/16);lctx.bezierCurveTo(ox+w*.3,oy+wy*h/8+h/16-3,ox+w*.7,oy+wy*h/8+h/16+3,ox+w,oy+wy*h/8+h/16);lctx.stroke()}
var coated=0,overCoated=0,total=gridW*gridH;
for(var y=0;y<gridH;y++)for(var x=0;x<gridW;x++){
var v=grid[y][x];
if(v>0){
var ratio=Math.min(v/2.5,1.5);
var alpha=Math.min(.5+ratio*.35,.92);
var r=Math.floor(50+ratio*70),g=Math.floor(32+ratio*48),b=Math.floor(15+ratio*22);
if(v>7){r=Math.floor(25+v*2.5);g=Math.floor(15+v*1.5);b=Math.floor(8+v)}
lctx.fillStyle='rgba('+r+','+g+','+b+','+alpha+')';
lctx.fillRect(ox+x*cellW,oy+y*cellH,cellW+1,cellH+1);
if(v>=.8&&v<=7){lctx.strokeStyle='rgba(212,168,83,'+(.1+ratio*.08)+')';lctx.lineWidth=1;lctx.strokeRect(ox+x*cellW+1,oy+y*cellH+1,cellW-1,cellH-1)}
if(v>=1.5&&v<=5&&Math.random()<.03){addLacquerSparkle(ox+x*cellW+Math.random()*cellW,oy+y*cellH+Math.random()*cellH)}
}
if(v>=.8&&v<=7)coated++;
else if(v>7)overCoated++;
}
var avgV=0;for(var y=0;y<gridH;y++)for(var x=0;x<gridW;x++)avgV+=grid[y][x];avgV/=total;
if(avgV>1){
lctx.save();lctx.globalAlpha=Math.min((avgV-1)*.3,.4);
lctx.shadowColor='rgba(180,140,80,.6)';lctx.shadowBlur=15;
lctx.strokeStyle='rgba(255,230,180,.3)';lctx.lineWidth=2;
lctx.strokeRect(ox+2,oy+2,w-4,h-4);
lctx.restore();
}
lctx.strokeStyle='rgba(212,168,83,.35)';lctx.lineWidth=2;lctx.strokeRect(ox,oy,w,h);
lctx.strokeStyle='rgba(212,168,83,.15)';lctx.lineWidth=1;lctx.strokeRect(ox-3,oy-3,w+6,h+6);
var pct=(coated/total)*100;
var lbar=document.getElementById('l-bar');if(lbar)lbar.style.width=Math.min(pct,100)+'%';
var qualityPct=0;
if(avgV>0){
var idealMin=.8,idealMax=5;
if(avgV>=idealMin&&avgV<=idealMax){qualityPct=80+Math.min(20,(1-Math.abs(avgV-2.5)/2.5)*20)}
else if(avgV<idealMin){qualityPct=(avgV/idealMin)*80}
else{qualityPct=Math.max(0,80-(avgV-idealMax)/3*80)}
}
var qbar=document.getElementById('l-quality');if(qbar)qbar.style.width=qualityPct+'%';
var glow=document.getElementById('l-glow');if(glow)glow.classList.toggle('active',qualityPct>65);
var lsubmit=document.getElementById('l-submit');
if(lsubmit){lsubmit.classList.toggle('hidden',pct<30)}
if(pct>=90&&overCoated/total<.2&&!lacquerFinished&&!lacquerDone)finishLacquer();
dustTimer+=1/60;
if(dustTimer>dustInterval){dustTimer=0;dustInterval=6+Math.random()*4;
var drx=Math.floor(Math.random()*gridW),dry=Math.floor(Math.random()*gridH);
if(grid[dry]&&grid[dry][drx]>0&&grid[dry][drx]<5)dusts.push({gx:drx,gy:dry,age:0,flaw:false})}
dusts.forEach(function(d){if(!d.flaw){d.age+=1/60;if(d.age>6)d.flaw=true}});
dusts.forEach(function(d){
var dpx=ox+d.gx*cellW+cellW/2,dpy=oy+d.gy*cellH+cellH/2;
if(d.flaw){lctx.fillStyle='rgba(35,20,10,.8)';lctx.beginPath();lctx.arc(dpx,dpy,3.5,0,Math.PI*2);lctx.fill();lctx.strokeStyle='rgba(15,8,3,.4)';lctx.lineWidth=.5;lctx.stroke()}
else{var blink=.5+Math.sin(d.age*5)*.35;lctx.fillStyle='rgba(245,225,185,'+blink+')';lctx.beginPath();lctx.arc(dpx,dpy,2.5,0,Math.PI*2);lctx.fill()}
});
for(var i=lacquerSparkles.length-1;i>=0;i--){var sp=lacquerSparkles[i];sp.life-=.02;sp.x+=sp.vx;sp.y+=sp.vy;sp.vy+=.02;
if(sp.life<=0){lacquerSparkles.splice(i,1);continue}
lctx.fillStyle='rgba(255,235,180,'+sp.life+')';lctx.beginPath();lctx.arc(sp.x,sp.y,sp.size*sp.life,0,Math.PI*2);lctx.fill();
}
if(painting&&lastLPoint&&curLPoint){
lctx.strokeStyle='rgba(255,240,200,.3)';lctx.lineWidth=26;lctx.lineCap='round';
lctx.beginPath();lctx.moveTo(lastLPoint.x,lastLPoint.y);lctx.lineTo(curLPoint.x,curLPoint.y);lctx.stroke();
lctx.strokeStyle='rgba(255,248,220,.5)';lctx.lineWidth=10;lctx.lineCap='round';
lctx.beginPath();lctx.moveTo(lastLPoint.x,lastLPoint.y);lctx.lineTo(curLPoint.x,curLPoint.y);lctx.stroke();
}
}
var lacquerRAF=null;
function loop4(){if(lacquerDone)return;drawLacquer();lacquerRAF=requestAnimationFrame(loop4)}
loop4();
function getL(e){var r=lcv.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(lw/r.width),y:(t.clientY-r.top)*(lh/r.height)}}
function paintAt(p){
var gx=Math.floor((p.x-20)/cellW),gy=Math.floor((p.y-20)/cellH);
for(var dy=-2;dy<=2;dy++)for(var dx=-2;dx<=2;dx++){
var ax=gx+dx,ay=gy+dy;
if(ax>=0&&ax<gridW&&ay>=0&&ay<gridH){
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist<.8)grid[ay][ax]=Math.min(10,grid[ay][ax]+.6);
else if(dist<1.8)grid[ay][ax]=Math.min(10,grid[ay][ax]+.35);
else if(dist<2.5)grid[ay][ax]=Math.min(10,grid[ay][ax]+.18);
else if(dist<3.2)grid[ay][ax]=Math.min(10,grid[ay][ax]+.08);
}
}
dusts=dusts.filter(function(d){if(d.flaw)return true;var dd=Math.sqrt((d.gx-gx)*(d.gx-gx)+(d.gy-gy)*(d.gy-gy));return dd>=3.5});
if(Math.random()<.15)addLacquerSparkle(p.x,p.y);
}
lcv.addEventListener('mousedown',function(e){e.preventDefault();painting=true;lastLPoint=null;curLPoint=getL(e);paintAt(curLPoint);AudioSys.click()});
lcv.addEventListener('mousemove',function(e){if(!painting)return;e.preventDefault();lastLPoint=curLPoint;curLPoint=getL(e);paintAt(curLPoint)});
lcv.addEventListener('mouseup',function(){painting=false;lastLPoint=null;curLPoint=null;AudioSys.click()});
lcv.addEventListener('mouseleave',function(){painting=false;lastLPoint=null;curLPoint=null});
lcv.addEventListener('touchstart',function(e){e.preventDefault();painting=true;var p=getL(e);lastLPoint=null;curLPoint=p;paintAt(p);AudioSys.click()},{passive:false});
lcv.addEventListener('touchmove',function(e){if(!painting)return;e.preventDefault();lastLPoint=curLPoint;curLPoint=getL(e);paintAt(curLPoint)},{passive:false});
lcv.addEventListener('touchend',function(){painting=false;lastLPoint=null;curLPoint=null;AudioSys.click()});
function finishLacquer(){
if(lacquerFinished)return;lacquerFinished=true;lacquerDone=true;if(lacquerRAF){cancelAnimationFrame(lacquerRAF);lacquerRAF=null}
var coated=0,overCoated=0,total=gridW*gridH;
for(var y=0;y<gridH;y++)for(var x=0;x<gridW;x++){var v=grid[y][x];if(v>=.8&&v<=7)coated++;else if(v>7)overCoated++}
var goodRatio=coated/total,overRatio=overCoated/total;
var flawCount=dusts.filter(function(d){return d.flaw}).length;
if(goodRatio>=.7&&overRatio<.25&&flawCount<=4)G._lacquerQuality='excellent';
else if(goodRatio>=.5&&flawCount<=7)G._lacquerQuality='pass';
else G._lacquerQuality='fail';
var res=document.getElementById('l-res');
if(G._lacquerQuality==='excellent'){res.innerHTML='✦ 漆面如镜，薄厚相宜 ✦<div class="mg-stars">'+qualityStars(G._lacquerQuality)+'</div>';res.className='mg-result good';AudioSys.success();spawnShellSparks()}
else if(G._lacquerQuality==='pass'){res.innerHTML='髹漆完成，略有不匀'+(flawCount>3?'（有'+flawCount+'处细微瑕疵）':'')+'<div class="mg-stars">'+qualityStars(G._lacquerQuality)+'</div>';res.className='mg-result'}
else{res.textContent='漆面未涂够，请重试';res.className='mg-result bad';AudioSys.fail();document.getElementById('l-retry').classList.remove('hidden');return}
setTimeout(function(){wrap.remove();if(G.dialogueTyping){skipType()}showKnowledgeCard('lacquering',function(){dialogueAdvance()})},1400);
}
document.getElementById('l-retry').onclick=function(){AudioSys.click();if(lacquerRAF){cancelAnimationFrame(lacquerRAF);lacquerRAF=null}for(var y=0;y<gridH;y++)for(var x=0;x<gridW;x++)grid[y][x]=0;G._lacquerQuality=null;lacquerDone=false;lacquerFinished=false;painting=false;lastLPoint=null;curLPoint=null;dusts=[];dustTimer=0;dustInterval=7;lacquerSparkles=[];document.getElementById('l-retry').classList.add('hidden');document.getElementById('l-res').textContent='';document.getElementById('l-submit').classList.add('hidden');lacquerRAF=requestAnimationFrame(loop4)};
document.getElementById('l-restart').onclick=function(){AudioSys.click();if(lacquerRAF){cancelAnimationFrame(lacquerRAF);lacquerRAF=null}for(var y=0;y<gridH;y++)for(var x=0;x<gridW;x++)grid[y][x]=0;G._lacquerQuality=null;lacquerDone=false;lacquerFinished=false;painting=false;lastLPoint=null;curLPoint=null;dusts=[];dustTimer=0;dustInterval=7;lacquerSparkles=[];document.getElementById('l-retry').classList.add('hidden');document.getElementById('l-res').textContent='';document.getElementById('l-submit').classList.add('hidden');var lbar=document.getElementById('l-bar');if(lbar)lbar.style.width='0%';var qbar=document.getElementById('l-quality');if(qbar)qbar.style.width='0%';lacquerRAF=requestAnimationFrame(loop4)};
document.getElementById('l-submit').onclick=function(){AudioSys.click();finishLacquer()};
}

function startAssembly(){
setChapter('嵌 钿');G.scene='assembly';staticCache={};
setTimeout(function(){showGuide('assembly','嵌钿入漆','拖动贝片对准纹样位置，接近时会自动吸附对齐。对准后点击「按下嵌钿」','💎')},500);
