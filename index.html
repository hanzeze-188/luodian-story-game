wrap.innerHTML='<div class="mg-title">嵌 钿 入 漆</div><button class="mg-restart" id="a-restart">⟲ 重新开始</button><div class="mg-quality-bar"><span class="mg-quality-label">对齐度</span><div class="mg-quality-track"><div class="mg-quality-fill" id="a-quality"></div></div></div><div class="mg-bar"><div class="mg-bar-fill" id="a-bar"></div></div><div class="mg-canvas-box" style="width:'+cw+'px;height:'+ch+'px"><div class="mg-glow" id="a-glow"></div></div><div class="mg-hint">✦ 拖动贝片对准虚线纹样位置<br>✦ 接近目标时会自动吸附对齐<br>✦ 对齐后点击「按下嵌钿」完成</div><div class="mg-result" id="a-res"></div><button class="mg-retry hidden" id="a-retry">重 新 嵌 钿</button><button class="mg-submit hidden" id="a-submit">按 下 嵌 钿</button>';
wrap.querySelector('.mg-canvas-box').appendChild(acv);
ui.appendChild(wrap);
var actx=acv.getContext('2d');
var aw=acv.width,ah=acv.height;
var bcx=aw/2,bcy=ah/2;
var targetX=bcx,targetY=bcy;
var shellX=bcx-100,shellY=bcy+60;
var dragging=false,dragOffX=0,dragOffY=0;
var assemblyDone=false,assemblyFinished=false;
var alignQuality=0;var snapped=false;
var shellSparkles=[];var embedParticles=[];
var shellRot=0;var targetRot=0;
function addShellSparkle(x,y){for(var i=0;i<2;i++)shellSparkles.push({x:x,y:y,life:1,size:1.5+Math.random()*2.5,vx:(Math.random()-.5)*2,vy:-Math.random()*2-.5,hue:30+Math.random()*40})}
function addEmbedBurst(x,y){for(var i=0;i<20;i++){var ang=Math.random()*Math.PI*2;var spd=1+Math.random()*3;embedParticles.push({x:x,y:y,life:1,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,size:2+Math.random()*3,hue:35+Math.random()*30})}}
function getPos(e){var r=acv.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(aw/r.width),y:(t.clientY-r.top)*(ah/r.height)}}
function drawAssembly(){
actx.fillStyle='#1a0f08';actx.fillRect(0,0,aw,ah);
actx.strokeStyle='rgba(212,168,83,.08)';actx.lineWidth=1;
for(var i=0;i<10;i++){actx.beginPath();actx.moveTo(0,i*ah/10+.5);actx.lineTo(aw,i*ah/10+.5);actx.stroke()}
var boxW=150,boxH=100;
var bg=actx.createRadialGradient(bcx,bcy,10,bcx,bcy,boxW*.7);
bg.addColorStop(0,'#2d1c10');bg.addColorStop(.6,'#1f120a');bg.addColorStop(1,'#150a05');
actx.fillStyle=bg;
actx.beginPath();actx.roundRect(bcx-boxW/2,bcy-boxH/2,boxW,boxH,6);actx.fill();
actx.strokeStyle='rgba(212,168,83,.3)';actx.lineWidth=2;
actx.beginPath();actx.roundRect(bcx-boxW/2,bcy-boxH/2,boxW,boxH,6);actx.stroke();
actx.strokeStyle='rgba(212,168,83,.12)';actx.lineWidth=1;
actx.beginPath();actx.roundRect(bcx-boxW/2-4,bcy-boxH/2-4,boxW+8,boxH+8,8);actx.stroke();
var tw=52,th=36;
var targetPulse=.5+Math.sin(Date.now()/400)*.2;
actx.strokeStyle='rgba(212,168,83,'+(.35+targetPulse*.25)+')';actx.lineWidth=2;actx.setLineDash([5,4]);
actx.beginPath();actx.ellipse(targetX,targetY,tw/2,th/2,0,0,Math.PI*2);actx.stroke();actx.setLineDash([]);
actx.strokeStyle='rgba(212,168,83,.25)';actx.lineWidth=1;
actx.beginPath();actx.moveTo(targetX-10,targetY);actx.lineTo(targetX+10,targetY);
actx.moveTo(targetX,targetY-10);actx.lineTo(targetX,targetY+10);actx.stroke();
actx.fillStyle='rgba(212,168,83,.4)';actx.beginPath();actx.arc(targetX,targetY,2,0,Math.PI*2);actx.fill();
var dx=shellX-targetX,dy=shellY-targetY;
var dist=Math.sqrt(dx*dx+dy*dy);
alignQuality=Math.max(0,1-dist/90);
var snapDist=25;
if(dragging&&dist<snapDist&&!snapped){
snapped=true;shellX=targetX;shellY=targetY;
for(var i=0;i<12;i++){var ang=Math.random()*Math.PI*2;var r=15+Math.random()*10;addShellSparkle(targetX+Math.cos(ang)*r,targetY+Math.sin(ang)*r)}
}
if(dragging&&dist>=snapDist){snapped=false}
if(!dragging&&dist<15){snapped=true;shellX=targetX;shellY=targetY}

actx.save();actx.translate(shellX,shellY);
if(snapped){
actx.save();
actx.shadowColor='rgba(255,220,130,.8)';actx.shadowBlur=25;
actx.strokeStyle='rgba(255,240,200,.5)';actx.lineWidth=2;
actx.beginPath();
actx.moveTo(0,-sh/2-3);actx.bezierCurveTo(sw/2+3,-sh/3-2,sw*.45+3,sh/3+2,0,sh/2+3);
actx.bezierCurveTo(-sw*.45-3,sh/3+2,-sw/2-3,-sh/3-2,0,-sh/2-3);
actx.closePath();actx.stroke();
actx.restore();
}
var ir=G.material==='abalone'?[[180,70,60],[280,60,55],[30,70,65]]:G.material==='luminous'?[[50,80,70],[180,60,65],[260,50,60]]:[[30,60,75],[200,40,70],[340,50,70]];
var t=Date.now()/1000;
var ig=actx.createRadialGradient(0,0,3,0,0,sw/2+5);
ir.forEach(function(c2,i){ig.addColorStop((t+i*.25)%1,'hsla('+c2[0]+','+c2[1]+'%,'+c2[2]+'%,.55)')});
ig.addColorStop(1,'transparent');
var baseG=actx.createLinearGradient(-sw/2,-sh/2,sw/2,sh/2);
baseG.addColorStop(0,'#f8ebcf');baseG.addColorStop(.3,'#f0ddb5');baseG.addColorStop(.7,'#e5d0a0');baseG.addColorStop(1,'#d4be8e');
actx.fillStyle=baseG;
actx.beginPath();
actx.moveTo(0,-sh/2);
actx.bezierCurveTo(sw/2,-sh/3,sw*.45,sh/3,0,sh/2);
actx.bezierCurveTo(-sw*.45,sh/3,-sw/2,-sh/3,0,-sh/2);
actx.closePath();
actx.fill();
actx.fillStyle=ig;actx.fill();
actx.strokeStyle='rgba(200,165,110,.5)';actx.lineWidth=1;actx.stroke();
actx.save();
actx.beginPath();
actx.moveTo(0,-sh/2);
actx.bezierCurveTo(sw/2,-sh/3,sw*.45,sh/3,0,sh/2);
actx.bezierCurveTo(-sw*.45,sh/3,-sw/2,-sh/3,0,-sh/2);
actx.closePath();
actx.clip();
var highlightG=actx.createLinearGradient(-sw/3,-sh/2,sw/4,sh/3);
highlightG.addColorStop(0,'rgba(255,255,240,.4)');
highlightG.addColorStop(.5,'rgba(255,250,220,.1)');
highlightG.addColorStop(1,'rgba(255,245,200,0)');
actx.fillStyle=highlightG;
actx.fillRect(-sw/2,-sh/2,sw,sh);
var lineG=actx.createLinearGradient(0,-sh/2,0,sh/2);
lineG.addColorStop(0,'rgba(255,245,210,.25)');
lineG.addColorStop(.5,'rgba(255,240,200,.08)');
lineG.addColorStop(1,'rgba(255,235,190,.2)');
actx.strokeStyle=lineG;actx.lineWidth=.8;
for(var li=0;li<5;li++){
var ly=-sh/2+sh*(li+1)/6;

actx.moveTo(-sw/3+li*4,ly);
actx.bezierCurveTo(-sw/6,ly-2,sw/6,ly+2,sw/3-li*3,ly);
actx.stroke();
}
actx.restore();
actx.restore();
for(var i=shellSparkles.length-1;i>=0;i--){var sp=shellSparkles[i];sp.life-=.025;sp.x+=sp.vx;sp.y+=sp.vy;sp.vy+=.03;
if(sp.life<=0){shellSparkles.splice(i,1);continue}

actx.beginPath();actx.arc(sp.x,sp.y,sp.size*sp.life,0,Math.PI*2);actx.fill();
actx.strokeStyle='hsla('+sp.hue+',75%,60%,'+(sp.life*.4)+')';
actx.lineWidth=1;actx.beginPath();actx.arc(sp.x,sp.y,sp.size*sp.life*1.8,0,Math.PI*2);actx.stroke();
}
for(var i=embedParticles.length-1;i>=0;i--){var ep=embedParticles[i];ep.life-=.02;ep.x+=ep.vx;ep.y+=ep.vy;ep.vx*=.97;ep.vy*=.97;

function calcEnding(){
var score=0;
if(G.traceQuality==='excellent')score+=3;else if(G.traceQuality==='pass')score+=1;
if(G._cutQuality==='excellent')score+=2;else if(G._cutQuality==='pass')score+=1;
if(G._polishQuality==='excellent')score+=2;else if(G._polishQuality==='pass')score+=1;
if(G._lacquerQuality==='excellent')score+=2;else if(G._lacquerQuality==='pass')score+=1;
if(G._assemblyQuality==='excellent')score+=3;else if(G._assemblyQuality==='pass')score+=1;
if(G.fragments.length>=4)score+=2;
if(G.material==='luminous'&&G.pattern==='lotus'&&G._cutQuality==='excellent'&&G._polishQuality==='excellent'&&G._lacquerQuality==='excellent'&&G.traceQuality==='excellent'&&G._assemblyQuality==='excellent')return'perfect';
if(score>=11)return'master';
if(score>=6)return'memory';
return'regret';
}

 * 老匠人（左，x=-0.8）+ 阿莲（右，x=+0.8）同框
 * 12 个预设机位 + 缓动过渡 + OrbitControls 自由视角
 * 替换原单一 Craftsman3D 模块
 */
const C3 = {
  ready:false, masterLoaded:false, alianLoaded:false, alianTried:false, visible:false,
  scene:null, camera:null, renderer:null, clock:null,
  master:{ model:null, root:null },
  alian: { model:null, root:null },
  curPreset:'wide',
  camAnim:null,
  orbit:null,
  orbitEnabled:false
};

/* 12 个预设机位：master_*（老匠人）/ alian_*（阿莲）/ 全局机位
 * 人物位置：老匠人 x=-1.0, y=-2.3, z=0.5；阿莲 x=1.0, y=-2.3, z=0.5
 * 角色高度：老匠人1.1 / 阿莲1.0，头顶 y=-1.2/-1.3
 */
const CAMERA_PRESETS = {
  master_full:  { pos:[-0.5, -0.5, 4.5], look:[-1.0, -1.75, 0.5], fov:28 },
  master_bust:  { pos:[-0.7, -0.3, 3.5],  look:[-1.0, -1.45, 0.5], fov:32 },
  master_face:  { pos:[-0.85, -0.15, 2.8],look:[-1.0, -1.25, 0.5], fov:36 },
  master_side:  { pos:[0.1, -0.4, 3.8],   look:[-1.0, -1.5, 0.5],  fov:30 },
  alian_full:   { pos:[0.5, -0.55, 4.5],  look:[1.0, -1.8, 0.5],   fov:28 },
  alian_bust:   { pos:[0.7, -0.35, 3.5],  look:[1.0, -1.5, 0.5],   fov:32 },
  alian_face:   { pos:[0.85, -0.2, 2.8],  look:[1.0, -1.3, 0.5],   fov:36 },
  alian_side:   { pos:[-0.1, -0.45, 3.8], look:[1.0, -1.55, 0.5],  fov:30 },
  wide:         { pos:[0.0, -0.4, 5.8],   look:[0.0, -1.8, 0.5],   fov:36 },
  two_shot:     { pos:[0.0, -0.5, 5.2],   look:[0.0, -1.85, 0.5],  fov:32 },
  player_pov:   { pos:[0.0, -0.4, 4.0],   look:[0.0, -1.65, 0.5],  fov:42 },
  oversee:      { pos:[0.0, 0.7, 3.5],    look:[0.0, -2.1, 0.5],   fov:34 }
};

const _canvas = document.getElementById('craftsman-3d');
const _status = document.getElementById('c3-status');
const _orbitHint = document.getElementById('c3-orbit-hint');

/* 镜头切换：缓动到预设机位（独立函数，便于外部调用） */
function transitionTo(presetName, duration){
  if(!C3.ready) return;
  const p = CAMERA_PRESETS[presetName];
  if(!p){ console.warn('[Cast3D] 未知机位:', presetName); return; }
  C3.curPreset = presetName;
  /* 自动切换机位时关闭自由视角 */
  if(C3.orbitEnabled) enableOrbit(false);
  C3.camAnim = {
    fromPos:  C3.camera.position.clone(),
    toPos:    new THREE.Vector3(p.pos[0], p.pos[1], p.pos[2]),
    fromLook: C3.orbit.target.clone(),
    toLook:   new THREE.Vector3(p.look[0], p.look[1], p.look[2]),
    fromFov:  C3.camera.fov,
    toFov:    p.fov,
    t:0, dur: duration||1.2
  };
}

/* 启用/禁用玩家自由视角（OrbitControls） */
function enableOrbit(enabled){
  if(!C3.ready) return;
  C3.orbitEnabled = !!enabled;
  C3.orbit.enabled = C3.orbitEnabled;
  if(C3.orbitEnabled){
    C3.camAnim = null;  /* 取消自动过渡，玩家接管 */
    if(_canvas){ _canvas.style.pointerEvents = 'auto'; _canvas.style.cursor = 'grab'; }
    if(_orbitHint) _orbitHint.style.opacity = '1';
  } else {
    if(_canvas){ _canvas.style.pointerEvents = 'none'; _canvas.style.cursor = ''; }
    if(_orbitHint) _orbitHint.style.opacity = '0';
    /* 关闭后过渡回当前预设机位 */
    transitionTo(C3.curPreset, 0.8);
  }
}

if(_canvas){
  /* 性能优化：降低3D渲染器像素比，减少GPU压力 - 安全访问G设置 */
  var _lowQuality = window.G && window.G.settings && window.G.settings.lowQuality;
  var _3dDpr = _lowQuality?1:Math.min(window.devicePixelRatio||1,1.25);
  C3.renderer = new THREE.WebGLRenderer({canvas:_canvas, alpha:true, antialias:!_lowQuality, powerPreference:'high-performance'});
  C3.renderer.setClearColor(0x000000, 0);
  C3.renderer.setPixelRatio(_3dDpr);
  C3.renderer.outputColorSpace = THREE.SRGBColorSpace;
  C3.renderer.toneMapping = THREE.ACESFilmicToneMapping;
  C3.renderer.toneMappingExposure = 1.1;
  C3.renderer.setSize(window.innerWidth, window.innerHeight, false);

  C3.scene = new THREE.Scene();
  C3.camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 50);
  C3.camera.position.set(0, 1.4, 5.5);
  C3.camera.lookAt(0, 1.0, 0);
  C3.clock = new THREE.Clock();

  /* 光照：暖色调，模拟作坊灯笼环境，增强亮度确保角色清晰可见 */
  C3.scene.add(new THREE.AmbientLight(0xfff0d0, 0.75));
  C3.scene.add(new THREE.HemisphereLight(0xfff5e0, 0x3a2a18, 0.6));
  const key = new THREE.DirectionalLight(0xffe8c0, 1.6);
  key.position.set(1.5, 3.5, 2.5);
  C3.scene.add(key);
  const fill = new THREE.DirectionalLight(0xa0b8d0, 0.55);
  fill.position.set(-2, 2, 2);
  C3.scene.add(fill);
  const lantern = new THREE.PointLight(0xffc070, 1.2, 10, 1.5);
  lantern.position.set(0, 2.5, 1.5);
  C3.scene.add(lantern);
  const rim = new THREE.DirectionalLight(0xffe0b0, 0.5);
  rim.position.set(0, 2, -2);
  C3.scene.add(rim);
  /* 额外正面补光，确保角色面部明亮 */
  const frontFill = new THREE.DirectionalLight(0xfff0e0, 0.4);
  frontFill.position.set(0, 1.8, 4);
  C3.scene.add(frontFill);

  /* 玩家自由视角控制（默认禁用） */
  C3.orbit = new OrbitControls(C3.camera, _canvas);
  C3.orbit.enableDamping = true;
  C3.orbit.dampingFactor = 0.08;
  C3.orbit.minDistance = 1.5;
  C3.orbit.maxDistance = 6;
  C3.orbit.minPolarAngle = 0.3;
  C3.orbit.maxPolarAngle = 1.5;
  C3.orbit.enablePan = false;
  C3.orbit.target.set(0, 1.0, 0);
  C3.orbit.enabled = false;

  C3.ready = true;
  if(_status){ _status.textContent='加载3D角色模型…'; _status.style.opacity='1'; }

  /* 通用模型加载与归一化函数 */
  function placeModel(gltf, targetHeight, posX, rotY){
    const model = gltf.scene;
    const box0 = new THREE.Box3().setFromObject(model);
    const size0 = box0.getSize(new THREE.Vector3());
    const scale = targetHeight / size0.y;
    model.scale.setScalar(scale);
    /* 重新计算缩放后的包围盒 */
    const box2 = new THREE.Box3().setFromObject(model);
    const center = box2.getCenter(new THREE.Vector3());
    /* 居中模型并让脚底贴地 */
    model.position.x -= center.x;
    model.position.y -= box2.min.y;
    model.position.z -= center.z;
    const root = new THREE.Group();
    /* 角色位置：老匠人左、阿莲右，站在桌子后面
       Y=-2.3 脚底在桌面下方，被桌子遮挡部分，Z=0.5 人物在货架前 */
    root.position.set(posX, -2.3, 0.5);
    root.rotation.y = rotY;
    root.add(model);
    model.traverse((o)=>{
      if(o.isMesh && o.material){
        o.material.envMapIntensity = 1.0;
        if(o.material.map) o.material.map.colorSpace = THREE.SRGBColorSpace;
        if(o.material.side === undefined) o.material.side = THREE.DoubleSide;
      }
    });
    return { model, root, size: size0 };
  }

  /* 老匠人：外部 GLB 文件加载（本地服务器），带超时和错误处理 */
  var _masterLoading=false;
  function loadMaster(){
    if(C3.masterLoaded || _masterLoading) return;
    _masterLoading = true;
    const loader = new GLTFLoader();
    if(_status){ _status.textContent='加载老匠人3D模型…'; _status.style.opacity='1'; }
    console.log('[Cast3D] 开始加载老匠人模型 assets/old-craftsman.glb');

    /* 超时处理：60秒（70MB大文件需要更长时间） */
    var _loadTimeout = setTimeout(function(){
      if(!C3.masterLoaded){
        console.warn('[Cast3D] 老匠人模型加载超时(60s)，回退2D立绘');
        _checkAllLoaded();
      }
    }, 60000);

    loader.load('assets/old-craftsman.glb',
      (gltf)=>{
        clearTimeout(_loadTimeout);
        try{
          /* 老匠人固定在左侧：x=-1.0，面向中心（轻微右转） */
          const r = placeModel(gltf, 1.1, -1.0, Math.PI*0.18);
          C3.master = r;
          C3.scene.add(r.root);
          C3.masterLoaded = true;
          console.log('[Cast3D] 老匠人加载完成 size:', r.size.x.toFixed(2), r.size.y.toFixed(2), r.size.z.toFixed(2));
          _checkAllLoaded();
        }catch(e){
          console.error('[Cast3D] 老匠人模型处理失败', e);
          _checkAllLoaded();
        }
      },
      (xhr)=>{
        if(xhr.lengthComputable && _status){
          const pct = Math.round(xhr.loaded/xhr.total*100);
          _status.textContent='加载老匠人3D模型…('+pct+'%)';
        }
      },
      (err)=>{
        clearTimeout(_loadTimeout);
        console.error('[Cast3D] 老匠人加载失败，回退2D立绘:', err);
        _checkAllLoaded();
      }
    );
  }

  /* 阿莲：fetch 加载（需要本地服务器），添加超时与重试 */
  var _alianLoading=false;
  function loadAlian(){
    if(C3.alianLoaded || _alianLoading) return;
    _alianLoading = true;
    C3.alianTried = true;
    const loader = new GLTFLoader();
    if(_status){ _status.textContent='加载阿莲3D模型…(0%)'; _status.style.opacity='1'; }
    console.log('[Cast3D] 开始加载阿莲模型 assets/alian.glb');

    /* 超时处理：60秒未加载完成则视为失败，回退2D（70MB大文件需要更长时间） */
    var _loadTimeout = setTimeout(function(){
      if(!C3.alianLoaded){
        console.warn('[Cast3D] 阿莲模型加载超时(60s)，回退2D立绘');
        if(_status){
          _status.textContent='⚠ 阿莲3D加载超时，使用2D立绘';
          _status.style.opacity='1';
          _status.style.borderColor='rgba(232,138,90,.6)';
          _status.style.color='#e88a5a';
          setTimeout(()=>{ _status.style.opacity='0'; }, 3500);
        }
        C3.alianLoaded = false;
        _checkAllLoaded();
      }
    }, 60000);

    loader.load('assets/alian.glb',
      (gltf)=>{
        clearTimeout(_loadTimeout);
        try{
          /* 阿莲固定在右侧：x=1.0，面向中心（轻微左转），与老匠人对称 */
          const r = placeModel(gltf, 1.0, 1.0, -Math.PI*0.18);
          C3.alian = r;
          C3.scene.add(r.root);
          C3.alianLoaded = true;
          /* 计算并打印模型实际世界坐标范围，便于调试机位 */
          const wb = new THREE.Box3().setFromObject(r.root);
          console.log('[Cast3D] 阿莲加载完成 size:', r.size.x.toFixed(2), r.size.y.toFixed(2), r.size.z.toFixed(2),
            'worldBox y:[', wb.min.y.toFixed(2), ',', wb.max.y.toFixed(2), ']',
            'x:[', wb.min.x.toFixed(2), ',', wb.max.x.toFixed(2), ']');
          _checkAllLoaded();
        }catch(e){
          console.error('[Cast3D] 阿莲模型处理失败:', e);
          C3.alianLoaded = false;
          _checkAllLoaded();
        }
      },
      (xhr)=>{
        if(xhr.lengthComputable){
          const pct = (xhr.loaded/xhr.total*100).toFixed(0);
          if(_status){ _status.textContent='加载阿莲3D模型…('+pct+'%)'; _status.style.opacity='1'; }
          if(xhr.loaded === xhr.total){
            console.log('[Cast3D] 阿莲 glb 下载完成，开始解析...');
          }
        }
      },
      (err)=>{
        clearTimeout(_loadTimeout);
        console.warn('[Cast3D] 阿莲模型加载失败，将回退到2D立绘', err);
        if(_status){
          _status.textContent='⚠ 阿莲3D加载失败，使用2D立绘（需本地服务器打开）';
          _status.style.opacity='1';
          _status.style.borderColor='rgba(232,138,90,.6)';
          _status.style.color='#e88a5a';
          setTimeout(()=>{ _status.style.opacity='0'; }, 4500);
        }
        C3.alianLoaded = false;
        _checkAllLoaded();
      }
    );
  }

  function _checkAllLoaded(){
    if(C3.masterLoaded && C3.alianTried){
      C3.ready = true;  /* 标记3D系统就绪 */
      C3.isReady = true;
      if(_status){
        if(C3.masterLoaded && C3.alianLoaded){
          _status.textContent='✓ 3D 角色就绪：老匠人 · 阿莲';
          _status.style.color='#8cc88c';
          _status.style.borderColor='rgba(140,200,140,.5)';
        } else if(C3.masterLoaded && !C3.alianLoaded){
          _status.textContent='⚠ 老匠人3D已就绪，阿莲使用2D立绘';
          _status.style.color='#e88a5a';
          _status.style.borderColor='rgba(232,138,90,.6)';
        }
        _status.style.opacity='1';
        setTimeout(()=>{ _status.style.opacity='0'; }, 4000);
      }
    }
  }

  /* 延迟加载，避免阻塞页面初始化 */
  if(!window.IS_FILE_PROTOCOL){
    /* http 模式：通过 URL 加载 GLB */
    setTimeout(loadMaster, 100);
    setTimeout(loadAlian, 300);
  } else {
    /* file:// 模式：由 cast3d-file.js 处理（CDN Three.js + base64 GLB） */
    /* 等待 cast3d-file.js 初始化完成后标记 ready */
    var _fileCheckTimer = setInterval(function(){
      if(window.Cast3D && window.Cast3D.isReady){
        C3.ready = true;
        _checkAllLoaded();
        clearInterval(_fileCheckTimer);
      }
    }, 500);
    /* 15秒超时回退2D */
    setTimeout(function(){
      if(!C3.ready){
        clearInterval(_fileCheckTimer);
        C3.ready = true;
        _checkAllLoaded();
        console.log('[Cast3D] file:// 模式 3D 初始化超时，使用 2D 立绘');
      }
    }, 15000);
  }

  /* 主循环 - 性能优化：不可见时降低帧率，可见时正常渲染 */
  var _lastRenderTime=0,_minFrameInterval=1000/30; /* 限制最高30fps减少GPU压力 */
  function _loop(ts){
    requestAnimationFrame(_loop);
    /* 不可见时完全跳过渲染 */
    if(!C3.visible) return;
    /* 帧率限制 */
    if(ts - _lastRenderTime < _minFrameInterval) return;
    _lastRenderTime = ts;
    const t = performance.now()*0.001;
    const dt = Math.min(C3.clock.getDelta(), 0.05);

    /* 镜头过渡（easeInOutQuad） */
    if(C3.camAnim){
      C3.camAnim.t += dt;
      const k = Math.min(C3.camAnim.t / C3.camAnim.dur, 1);
      const e = k<0.5 ? 2*k*k : 1-Math.pow(-2*k+2,2)/2;
      C3.camera.position.lerpVectors(C3.camAnim.fromPos, C3.camAnim.toPos, e);
      C3.orbit.target.lerpVectors(C3.camAnim.fromLook, C3.camAnim.toLook, e);
      C3.camera.fov = C3.camAnim.fromFov + (C3.camAnim.toFov - C3.camAnim.fromFov) * e;
      C3.camera.updateProjectionMatrix();
      if(k>=1) C3.camAnim = null;
    }

    /* 角色待机动画：极细微的呼吸感，保持位置稳定 */
    if(C3.master.root){
      C3.master.root.rotation.z = Math.sin(t*0.4)*0.004;
    }
    if(C3.alian.root){
      C3.alian.root.rotation.z = Math.sin(t*0.45+1)*0.003;
    }

    /* OrbitControls 阻尼更新 */
    if(C3.orbitEnabled && C3.orbit) C3.orbit.update();

    C3.renderer.render(C3.scene, C3.camera);
  }
  _loop();

  /* 窗口尺寸适配 */
  window.addEventListener('resize', ()=>{
    if(!C3.ready) return;
    C3.renderer.setSize(window.innerWidth, window.innerHeight, false);
    C3.camera.aspect = window.innerWidth / window.innerHeight;
    C3.camera.updateProjectionMatrix();
  });
}

/* === 暴露接口（Cast3D 新接口 + Craftsman3D 兼容旧接口） === */
window.Cast3D = {
  get isReady(){ return C3.ready; },
  get isLoaded(){ return C3.masterLoaded; },
  get masterLoaded(){ return C3.masterLoaded; },
  get alianLoaded(){ return C3.alianLoaded; },
  get alianAvailable(){ return C3.alianLoaded; },
  get currentPreset(){ return C3.curPreset; },
  get orbitEnabled(){ return C3.orbitEnabled; },
  /* 全屏显示 3D 场景（保留旧签名 show(x,y,scale) 但忽略参数） */
  show(x, y, scale){
    if(!C3.ready) return false;
    C3.visible = true;
    if(_canvas) _canvas.style.opacity = '1';
    return C3.masterLoaded;
  },
  hide(){
    C3.visible = false;
    if(_canvas) _canvas.style.opacity = '0';
    if(_status) _status.style.opacity = '0';
    if(_orbitHint) _orbitHint.style.opacity = '0';
  },
  transitionTo(preset, dur){ transitionTo(preset, dur); },
  enableOrbit(enabled){ enableOrbit(enabled); },
  presets(){ return Object.keys(CAMERA_PRESETS); }
};
/* 兼容旧接口 window.Craftsman3D */
window.Craftsman3D = window.Cast3D;
</script>
</body>
</html>
